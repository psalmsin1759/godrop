          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rating]
              properties:
                rating: { type: integer, minimum: 1, maximum: 5 }
                comment: { type: string }
      responses:
        "200":
          description: Review created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  review: { $ref: "#/components/schemas/Review" }

  /orders/{id}/reorder:
    post:
      tags: [Orders]
      summary: Pre-fill cart from past order
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
