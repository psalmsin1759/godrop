  # ─ Parcel ─────────────────────────────────────────────────────

  /parcel/vehicle-types:
    get:
      tags: [Parcel]
      summary: List active parcel vehicle types
      description: Returns all active vehicle types with their base fee and per-km rate. Display these to the customer before they request a quote.
      responses:
        "200":
          description: Active vehicle types
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  types:
                    type: array
                    items: { $ref: "#/components/schemas/ParcelVehicleType" }
    post:
      tags: [Parcel]
      summary: Create parcel vehicle type (admin)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, baseFeeKobo, perKmKobo]
              properties:
                name: { type: string, example: "Motorcycle" }
                description: { type: string }
                imageUrl: { type: string, format: uri }
                baseFeeKobo: { type: integer, example: 50000 }
                perKmKobo: { type: integer, example: 8000 }
                isActive: { type: boolean, default: true }
      responses:
        "201":
          description: Vehicle type created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  type: { $ref: "#/components/schemas/ParcelVehicleType" }
        "409":
          description: Name already exists
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /parcel/vehicle-types/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Parcel]
      summary: Get a parcel vehicle type
      responses:
        "200":
          description: Vehicle type
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  type: { $ref: "#/components/schemas/ParcelVehicleType" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
    patch:
      tags: [Parcel]
      summary: Update parcel vehicle type (admin)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
                imageUrl: { type: string, format: uri }
                baseFeeKobo: { type: integer }
                perKmKobo: { type: integer }
                isActive: { type: boolean }
      responses:
        "200":
          description: Updated vehicle type
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  type: { $ref: "#/components/schemas/ParcelVehicleType" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
        "409":
          description: Name already exists
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
    delete:
      tags: [Parcel]
      summary: Delete parcel vehicle type (admin)
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /parcel/admin/vehicle-types:
    get:
      tags: [Parcel]
      summary: List all parcel vehicle types including inactive (admin)
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: All vehicle types
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  types:
                    type: array
                    items: { $ref: "#/components/schemas/ParcelVehicleType" }

  /parcel/quote:
    post:
      tags: [Parcel]
      summary: Get parcel delivery quote
      description: |
        Returns a price breakdown and estimated delivery time. If `vehicleTypeId` is provided the
        quote uses that vehicle type's `baseFeeKobo` and `perKmKobo`; otherwise the platform defaults apply.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pickup, dropoff]
              properties:
                pickup: { $ref: "#/components/schemas/LocationInput" }
                dropoff: { $ref: "#/components/schemas/LocationInput" }
                vehicleTypeId: { type: string, description: "ID of a ParcelVehicleType to price by" }
                weightKg: { type: number }
                sizeCategory: { type: string, enum: [small, medium, large, extra_large] }
      responses:
        "200":
          description: Price quote
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  priceBreakdown: { $ref: "#/components/schemas/PriceBreakdownParcel" }
                  distanceKm: { type: number }
                  estimatedMinutes: { type: integer }
        "404":
          description: Vehicle type not found or inactive
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /parcel/orders:
    post:
      tags: [Parcel]
      summary: Place parcel order
      description: |
        Creates a PENDING parcel order and immediately sends an FCM push notification to all
        online riders. If `vehicleTypeId` is supplied, pricing is derived from that vehicle type.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pickup, dropoff, packageDescription, paymentMethod, recipientName, recipientPhone]
              properties:
                pickup: { $ref: "#/components/schemas/LocationInput" }
