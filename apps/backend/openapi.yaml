  # ══════════════════════════════════════════════════════════════
  # VENDOR ONBOARDING
  # ══════════════════════════════════════════════════════════════

  /vendor:
    post:
      tags: [Vendor Onboarding]
      summary: Apply as a vendor (multipart/form-data with documents)
      description: |
        Creates a vendor and an OWNER account in one step. The vendor starts in `PENDING` status
        and must be approved by a system admin before it is visible to customers.

        **Request format:** `multipart/form-data`. All text fields are included as form fields.
        Three document files are required (image or PDF, max 10 MB each):
        - `businessRegistration` — Nigerian business registration certificate (CAC)
        - `governmentId` — Government-issued ID of the business owner (NIN, international passport, driver's licence)
        - `utilityBill` — Recent utility bill showing business address

        **Documents** are uploaded to Cloudinary with the following folder structure:
        - `godrop/vendor-docs/business-registration/`
        - `godrop/vendor-docs/government-id/`
        - `godrop/vendor-docs/utility-bill/`

        **Emails sent on success:**
        1. Confirmation email to vendor owner — states admin will review within 1–2 business days.
        2. Notification email to all system admins opted in to `receiveVendorEmails`.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, type, address, lat, lng, phone, email, ownerFirstName, ownerLastName, ownerPassword, businessRegistration, governmentId, utilityBill]
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                  example: "Mama's Kitchen"
                type:
                  type: string
                  enum: [RESTAURANT, GROCERY, RETAIL, PHARMACY]
                description:
                  type: string
                  maxLength: 500
                address:
                  type: string
                  example: "14 Admiralty Way, Lekki Phase 1, Lagos"
                lat: { type: number, example: 6.4314 }
                lng: { type: number, example: 3.4703 }
                phone:
                  type: string
                  pattern: '^\+234\d{10}$'
                  example: "+2348012345678"
                email:
                  type: string
                  format: email
                  example: "owner@mamaskitchen.ng"
                cuisines:
                  type: string
                  description: JSON-encoded array of strings, e.g. '["Nigerian","Soups"]'
                  example: '["Nigerian","Soups"]'
                openingHours:
                  type: string
                  description: JSON-encoded object, e.g. '{"monday":{"open":"08:00","close":"22:00"}}'
                ownerFirstName: { type: string, example: "Mama" }
                ownerLastName: { type: string, example: "Ngozi" }
                ownerPassword:
                  type: string
                  minLength: 8
                  example: "SecurePass123!"
                businessRegistration:
                  type: string
                  format: binary
                  description: Nigerian CAC certificate (image or PDF, max 10 MB)
                governmentId:
                  type: string
                  format: binary
                  description: Government-issued ID of the business owner (image or PDF, max 10 MB)
                utilityBill:
                  type: string
                  format: binary
                  description: Recent utility bill showing business address (image or PDF, max 10 MB)
      responses:
        "201":
          description: Vendor application submitted. Confirmation email sent to owner; notification sent to admin recipients.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  vendor: { $ref: "#/components/schemas/VendorFull" }
                  admin:
                    allOf:
                      - $ref: "#/components/schemas/VendorAdminProfile"
                      - type: object
                        description: Password excluded from response
        "400":
          description: Missing required documents
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }
        "409":
          description: Email already registered
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

