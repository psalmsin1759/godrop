openapi: 3.0.3
info:
  title: Godrop API
  description: |
    On-demand delivery and logistics platform for Nigeria.

    **Authentication domains:**
    - **Customer API** — Phone OTP → JWT. Pass token as `Authorization: Bearer <token>`.
    - **Vendor Admin API** — Email + password → JWT. Same header. Token payload contains `type: "admin"`.
    - **System Admin API** — Email + password → JWT. Same header. Token payload contains `type: "admin"`.

    **Currency:** All monetary amounts are in **Kobo** (₦ × 100). Never Naira floats.
    **Phone:** E.164 format, e.g. `+2348012345678`.

    **Response envelope:**
    - Success: `{ "success": true, ...fields }` — fields vary by endpoint (see each response schema).
    - Error: `{ "success": false, "error": "message" }`.
    - Single-entity detail responses wrap the entity in a `data` key.
    - Paginated list responses return `data` (array) + `meta` (pagination) at the top level.
  version: 1.0.0
  contact:
    name: Godrop Engineering
    email: dev@godrop.ng

servers:
  - url: https://api.godrop.ng/v1
    description: Production
  - url: http://localhost:4000/api/v1
    description: Local development

# ─── Security ─────────────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Used by all three auth domains (customer, vendor admin, system admin). Each token encodes a `type` claim."

  schemas:
    # ─ Primitives ─────────────────────────────────────────────
    Pagination:
      type: object
      properties:
        page: { type: integer, example: 1 }
        limit: { type: integer, example: 20 }
        total: { type: integer, example: 143 }
        totalPages: { type: integer, example: 8 }

    ApiSuccess:
      type: object
      properties:
        success: { type: boolean, example: true }

    ApiError:
      type: object
      properties:
        success: { type: boolean, example: false }
        error: { type: string }

    # ─ Customer Auth ──────────────────────────────────────────
    TokenPair:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }

    # ─ Customer Profile ───────────────────────────────────────
    User:
      type: object
      properties:
        id: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        phone: { type: string, example: "+2348012345678" }
        email: { type: string, format: email }
        avatarUrl: { type: string }
        walletBalanceKobo: { type: integer }

    Address:
      type: object
      properties:
        id: { type: string }
        label: { type: string, example: "Home" }
        address: { type: string }
        lat: { type: number }
        lng: { type: number }
        isDefault: { type: boolean }

    # ─ Wallet ─────────────────────────────────────────────────
    WalletTransaction:
      type: object
      properties:
        id: { type: string }
        type: { type: string, enum: [TOPUP, PAYMENT, REFUND] }
        amountKobo: { type: integer }
        reference: { type: string }
        description: { type: string }
        createdAt: { type: string, format: date-time }

    # ─ Vendors (customer-facing) ──────────────────────────────
    Restaurant:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        logoUrl: { type: string }
        cuisines: { type: array, items: { type: string } }
        rating: { type: number }
        deliveryFeeKobo: { type: integer }
        estimatedMinutes: { type: integer }
        isOpen: { type: boolean }

    MenuItem:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        priceKobo: { type: integer }
        imageUrl: { type: string }
        isAvailable: { type: boolean }

    Product:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        priceKobo: { type: integer }
        imageUrl: { type: string }
        stock: { type: integer }

    Review:
      type: object
      properties:
        id: { type: string }
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string }
        createdAt: { type: string, format: date-time }

    # ─ Orders ─────────────────────────────────────────────────
    Order:
      type: object
      properties:
        id: { type: string }
        trackingCode: { type: string, example: "GD-261234567" }
        type:
          type: string
          enum: [FOOD, GROCERY, RETAIL, PHARMACY, PARCEL, TRUCK]
        status:
          type: string
          enum: [PENDING, ACCEPTED, PREPARING, READY_FOR_PICKUP, PICKED_UP, IN_TRANSIT, DELIVERED, CANCELLED, FAILED]
        totalKobo: { type: integer }
        createdAt: { type: string, format: date-time }

    TruckType:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        capacity: { type: string }
        imageUrl: { type: string }
        baseFeeKobo: { type: integer }
        perKmKobo: { type: integer }
        isActive: { type: boolean }

    ApartmentType:
      type: object
      properties:
        id: { type: string }
        name: { type: string, example: "2 Bedroom Flat" }
        description: { type: string }
        priceKobo: { type: integer, example: 8000000 }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    TruckPricingConfig:
      type: object
      properties:
        id: { type: string, example: "singleton" }
        perKmKobo: { type: integer, example: 15000, description: "Cost per kilometre in Kobo" }
        perLoaderKobo: { type: integer, example: 500000, description: "Cost per loader in Kobo" }
        updatedAt: { type: string, format: date-time }

    TruckPricingSummary:
      type: object
      properties:
        apartmentTypes:
          type: array
          items: { $ref: "#/components/schemas/ApartmentType" }
        perKmKobo: { type: integer, example: 15000 }
        perLoaderKobo: { type: integer, example: 500000 }

    Notification:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        body: { type: string }
        isRead: { type: boolean }
        createdAt: { type: string, format: date-time }

    Banner:
      type: object
      properties:
        id: { type: string }
        imageUrl: { type: string }
        title: { type: string }
        linkType: { type: string }
        linkValue: { type: string }

    LocationInput:
      type: object
      required: [lat, lng, address]
      properties:
        lat: { type: number }
        lng: { type: number }
        address: { type: string }

    PriceBreakdownParcel:
      type: object
      properties:
        deliveryFeeKobo: { type: integer }
        serviceFeeKobo: { type: integer }
        totalKobo: { type: integer }

    PriceBreakdownTruck:
      type: object
      properties:
        apartmentCostKobo: { type: integer, description: "Fixed cost for the apartment type" }
        distanceKm: { type: number, description: "Total route distance in km" }
        kmCostKobo: { type: integer, description: "Distance cost (distanceKm × perKmKobo)" }
        loadersCostKobo: { type: integer, description: "Loaders cost (numLoaders × perLoaderKobo)" }
        totalKobo: { type: integer }

    # ─ Vendor Onboarding / Admin ──────────────────────────────
    VendorAdminProfile:
      type: object
      properties:
        id: { type: string }
        email: { type: string, format: email }
        firstName: { type: string }
        lastName: { type: string }
        role:
          type: string
          enum: [OWNER, MANAGER, STAFF]
        isActive: { type: boolean }
        vendorId: { type: string }
        vendor: { $ref: "#/components/schemas/VendorFull" }
        createdAt: { type: string, format: date-time }

    VendorFull:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        type:
          type: string
          enum: [RESTAURANT, GROCERY, RETAIL, PHARMACY]
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED, SUSPENDED]
        description: { type: string }
        logoUrl: { type: string }
        coverUrl: { type: string }
        address: { type: string }
        lat: { type: number }
        lng: { type: number }
        phone: { type: string }
        email: { type: string, format: email }
        cuisines: { type: array, items: { type: string } }
        rating: { type: number }
        ratingCount: { type: integer }
        deliveryFeeKobo: { type: integer }
        estimatedMinutes: { type: integer }
        isOpen: { type: boolean }
        isActive: { type: boolean }
        openingHours: { type: object }
        rejectionReason: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ProductCategory:
      type: object
      properties:
        id: { type: string }
        vendorId: { type: string }
        name: { type: string }
        description: { type: string }
        imageUrl: { type: string }
        isActive: { type: boolean }
        sortOrder: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        _count:
          type: object
          properties:
            products: { type: integer }

    ProductAdmin:
      type: object
      properties:
        id: { type: string }
        categoryId: { type: string }
        category:
          type: object
          properties:
            id: { type: string }
            name: { type: string }
        name: { type: string }
        description: { type: string }
        priceKobo: { type: integer }
        imageUrl: { type: string }
        isAvailable: { type: boolean }
        stock: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    VendorOrder:
      type: object
      properties:
        id: { type: string }
        trackingCode: { type: string }
        status:
          type: string
          enum: [PENDING, ACCEPTED, PREPARING, READY_FOR_PICKUP, PICKED_UP, IN_TRANSIT, DELIVERED, CANCELLED, FAILED]
        type:
          type: string
          enum: [FOOD, GROCERY, RETAIL, PHARMACY, PARCEL, TRUCK]
        items:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              quantity: { type: integer }
              unitPriceKobo: { type: integer }
              totalKobo: { type: integer }
              notes: { type: string }
        customer:
          type: object
          properties:
            firstName: { type: string }
            lastName: { type: string }
            phone: { type: string }
        subtotalKobo: { type: integer }
        deliveryFeeKobo: { type: integer }
        serviceFeeKobo: { type: integer }
        discountKobo: { type: integer }
        totalKobo: { type: integer }
        paymentMethod: { type: string, enum: [CARD, WALLET, CASH] }
        paymentStatus: { type: string, enum: [PENDING, PAID, REFUNDED, FAILED] }
        notes: { type: string }
        createdAt: { type: string, format: date-time }

    AdminCustomer:
      type: object
      description: Customer record as seen by system admins (list view)
      properties:
        id: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        phone: { type: string, example: "+2348012345678" }
        email: { type: string, format: email, nullable: true }
        avatarUrl: { type: string, nullable: true }
        isVerified: { type: boolean }
        status:
          type: string
          enum: [ACTIVE, SUSPENDED, DEACTIVATED]
        createdAt: { type: string, format: date-time }
        wallet:
          type: object
          nullable: true
          properties:
            balanceKobo: { type: integer }
        _count:
          type: object
          properties:
            orders: { type: integer }

    AdminCustomerDetail:
      type: object
      description: Full customer profile returned to system admins (detail view)
      properties:
        id: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        phone: { type: string, example: "+2348012345678" }
        email: { type: string, format: email, nullable: true }
        avatarUrl: { type: string, nullable: true }
        referralCode: { type: string, nullable: true }
        isVerified: { type: boolean }
        status:
          type: string
          enum: [ACTIVE, SUSPENDED, DEACTIVATED]
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        wallet:
          type: object
          nullable: true
          properties:
            id: { type: string }
            balanceKobo: { type: integer }
            createdAt: { type: string, format: date-time }
        _count:
          type: object
          properties:
            orders: { type: integer }
            addresses: { type: integer }

    AdminWallet:
      type: object
      description: Customer wallet with owner summary
      properties:
        id: { type: string }
        balanceKobo: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        user:
          type: object
          properties:
            id: { type: string }
            firstName: { type: string }
            lastName: { type: string }
            phone: { type: string }

    AdminWalletTransaction:
      type: object
      properties:
        id: { type: string }
        walletId: { type: string }
        type:
          type: string
          enum: [TOPUP, PAYMENT, REFUND]
        amountKobo: { type: integer }
        reference: { type: string, nullable: true }
        description: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    AdminOrder:
      type: object
      description: Full order record returned to system admins
      properties:
        id: { type: string }
        trackingCode: { type: string, example: "GD-261234567" }
        status:
          type: string
          enum: [PENDING, ACCEPTED, PREPARING, READY_FOR_PICKUP, PICKED_UP, IN_TRANSIT, DELIVERED, CANCELLED, FAILED]
        type:
          type: string
          enum: [FOOD, GROCERY, RETAIL, PHARMACY, PARCEL, TRUCK]
        vendor:
          type: object
          nullable: true
          properties:
            id: { type: string }
            name: { type: string }
            type: { type: string, enum: [RESTAURANT, GROCERY, RETAIL, PHARMACY] }
        customer:
          type: object
          properties:
            id: { type: string }
            firstName: { type: string }
            lastName: { type: string }
            phone: { type: string }
        rider:
          type: object
          nullable: true
          properties:
            id: { type: string }
            firstName: { type: string }
            lastName: { type: string }
            phone: { type: string }
            lat: { type: number, nullable: true }
            lng: { type: number, nullable: true }
        items:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              quantity: { type: integer }
              unitPriceKobo: { type: integer }
              totalKobo: { type: integer }
              notes: { type: string }
        timeline:
          type: array
          description: Ordered history of status transitions
          items:
            type: object
            properties:
              status: { type: string }
              description: { type: string }
              createdAt: { type: string, format: date-time }
        apartmentType:
          type: object
          nullable: true
          description: Present only for TRUCK orders
          properties:
            id: { type: string }
            name: { type: string, example: "2 Bedroom Flat" }
            priceKobo: { type: integer }
        numLoaders: { type: integer, nullable: true, description: "Number of loaders requested (TRUCK orders)" }
        stops:
          type: array
          nullable: true
          description: Intermediate stops (TRUCK orders)
          items:
            type: object
            properties:
              lat: { type: number }
              lng: { type: number }
              address: { type: string }
        pickupAddress: { type: string }
        pickupLat: { type: number }
        pickupLng: { type: number }
        dropoffAddress: { type: string }
        dropoffLat: { type: number }
        dropoffLng: { type: number }
        packageDescription: { type: string, nullable: true, description: "PARCEL orders" }
        weightKg: { type: number, nullable: true, description: "PARCEL orders" }
        sizeCategory: { type: string, nullable: true, description: "PARCEL orders" }
        recipientName: { type: string, nullable: true, description: "PARCEL orders" }
        recipientPhone: { type: string, nullable: true, description: "PARCEL orders" }
        subtotalKobo: { type: integer }
        deliveryFeeKobo: { type: integer }
        serviceFeeKobo: { type: integer }
        discountKobo: { type: integer }
        totalKobo: { type: integer }
        paymentMethod: { type: string, enum: [CARD, WALLET, CASH] }
        paymentStatus: { type: string, enum: [PENDING, PAID, REFUNDED, FAILED] }
        scheduledAt: { type: string, format: date-time, nullable: true }
        estimatedMinutes: { type: integer, nullable: true }
        notes: { type: string, nullable: true }
        cancellationReason: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    TeamMember:
      type: object
      properties:
        id: { type: string }
        email: { type: string, format: email }
        firstName: { type: string }
        lastName: { type: string }
        role: { type: string, enum: [OWNER, MANAGER, STAFF] }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }

    VendorSettings:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        phone: { type: string }
        email: { type: string }
        deliveryFeeKobo: { type: integer }
        estimatedMinutes: { type: integer }
        isOpen: { type: boolean }
        openingHours: { type: object }

    # ─ System Admin ───────────────────────────────────────────
    SystemAdminProfile:
      type: object
      properties:
        id: { type: string }
        email: { type: string, format: email }
        firstName: { type: string }
        lastName: { type: string }
        role: { type: string, enum: [SUPER_ADMIN, ADMIN] }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }

    VendorSummary:
      type: object
      description: Vendor list item returned to system admins
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string, enum: [RESTAURANT, GROCERY, RETAIL, PHARMACY] }
        status: { type: string, enum: [PENDING, APPROVED, REJECTED, SUSPENDED] }
        email: { type: string }
        phone: { type: string }
        address: { type: string }
        rating: { type: number }
        isOpen: { type: boolean }
        isActive: { type: boolean }
        admins:
          type: array
          description: Owner account only
          items:
            type: object
            properties:
              id: { type: string }
              email: { type: string }
              firstName: { type: string }
              lastName: { type: string }
        _count:
          type: object
          properties:
            orders: { type: integer }
            categories: { type: integer }
        createdAt: { type: string, format: date-time }

    AuditLog:
      type: object
      properties:
        id: { type: string }
        admin:
          type: object
          nullable: true
          properties:
            id: { type: string }
            email: { type: string }
            firstName: { type: string }
            lastName: { type: string }
        vendor:
          type: object
          nullable: true
          properties:
            id: { type: string }
            name: { type: string }
        action: { type: string, example: "APPROVE_VENDOR" }
        entity: { type: string, example: "Vendor" }
        entityId: { type: string }
        oldValues: { type: object }
        newValues: { type: object }
        ipAddress: { type: string }
        userAgent: { type: string }
        createdAt: { type: string, format: date-time }

    VendorAnalytics:
      type: object
      properties:
        summary:
          type: object
          properties:
            totalOrders: { type: integer, example: 120 }
            completedOrders: { type: integer, example: 98 }
            cancelledOrders: { type: integer, example: 8 }
            totalRevenueKobo: { type: integer, example: 24000000, description: "Sum of subtotalKobo for PAID orders" }
            avgOrderValueKobo: { type: integer, example: 244897 }
        ordersByStatus:
          type: array
          items:
            type: object
            properties:
              status: { type: string, enum: [PENDING, ACCEPTED, PREPARING, READY_FOR_PICKUP, PICKED_UP, IN_TRANSIT, DELIVERED, CANCELLED, FAILED] }
              count: { type: integer }
        revenueByDay:
          type: array
          items:
            type: object
            properties:
              date: { type: string, format: date, example: "2026-01-15" }
              orders: { type: integer }
              revenueKobo: { type: integer }
        topProducts:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              orders: { type: integer }
              revenueKobo: { type: integer }

    SystemAnalytics:
      type: object
      properties:
        summary:
          type: object
          properties:
            totalUsers: { type: integer }
            newUsers: { type: integer, description: "New users in the selected date range" }
            totalVendors: { type: integer }
            activeVendors: { type: integer, description: "Vendors with status APPROVED" }
            pendingVendors: { type: integer }
            totalOrders: { type: integer }
            completedOrders: { type: integer }
            totalRevenueKobo: { type: integer, description: "Sum of totalKobo for all PAID orders" }
        ordersByStatus:
          type: array
          items:
            type: object
            properties:
              status: { type: string }
              count: { type: integer }
        ordersByType:
          type: array
          items:
            type: object
            properties:
              type: { type: string, enum: [FOOD, GROCERY, RETAIL, PHARMACY, PARCEL, TRUCK] }
              count: { type: integer }
              revenueKobo: { type: integer }
        revenueByDay:
          type: array
          items:
            type: object
            properties:
              date: { type: string, format: date }
              orders: { type: integer }
              revenueKobo: { type: integer }
        topVendors:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              name: { type: string }
              type: { type: string, enum: [RESTAURANT, GROCERY, RETAIL, PHARMACY] }
              rating: { type: number }
              orders: { type: integer }
              revenueKobo: { type: integer }

    VendorGraphData:
      type: object
      properties:
        granularity:
          type: string
          enum: [day, week, month]
          example: day
        points:
          type: array
          items:
            type: object
            required: [date, orders, revenueKobo]
            properties:
              date:
                type: string
                format: date
                description: "Start of the period bucket (YYYY-MM-DD). For week/month granularity this is the Monday/first-of-month in Africa/Lagos time."
                example: "2026-04-21"
              orders:
                type: integer
                example: 14
              revenueKobo:
                type: integer
                description: "Sum of subtotalKobo for PAID orders in this bucket"
                example: 3450000

    SystemGraphData:
      type: object
      properties:
        granularity:
          type: string
          enum: [day, week, month]
          example: day
        points:
          type: array
          items:
            type: object
            required: [date, orders, revenueKobo, newUsers]
            properties:
              date:
                type: string
                format: date
                description: "Start of the period bucket (YYYY-MM-DD). For week/month granularity this is the Monday/first-of-month in Africa/Lagos time."
                example: "2026-04-21"
              orders:
                type: integer
                example: 340
              revenueKobo:
                type: integer
                description: "Sum of totalKobo for PAID orders in this bucket"
                example: 87500000
              newUsers:
                type: integer
                description: "New user registrations in this bucket"
                example: 27

# ─── Paths ────────────────────────────────────────────────────
paths:

  # ══════════════════════════════════════════════════════════════
  # CUSTOMER API
  # ══════════════════════════════════════════════════════════════

  # ─ Auth & Onboarding ─────────────────────────────────────────
  /auth/otp/request:
    post:
      tags: [Auth]
      summary: Request OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone: { type: string, example: "+2348012345678" }
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "OTP sent" }
                  expiresIn: { type: integer, description: "Seconds until OTP expires", example: 600 }

  /auth/otp/verify:
    post:
      tags: [Auth]
      summary: Verify OTP and issue tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, otp]
              properties:
                phone: { type: string }
                otp: { type: string, minLength: 6, maxLength: 6 }
      responses:
        "200":
          description: OTP verified — returns tokens and whether this is a new user
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  accessToken: { type: string }
                  refreshToken: { type: string }
                  isNewUser: { type: boolean }
        "400":
          description: Invalid or expired OTP
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /auth/register:
    post:
      tags: [Auth]
      summary: Complete registration (new users only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, firstName, lastName]
              properties:
                phone: { type: string }
                firstName: { type: string }
                lastName: { type: string }
                email: { type: string, format: email }
                referralCode: { type: string }
      responses:
        "201":
          description: Registration complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  accessToken: { type: string }
                  refreshToken: { type: string }
                  user: { $ref: "#/components/schemas/User" }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        "200":
          description: New token pair
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  accessToken: { type: string }
                  refreshToken: { type: string }
        "401":
          description: Invalid or expired refresh token

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout (revoke refresh token)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
