        - in: query
          name: type
          schema: { type: string, enum: [FOOD, GROCERY, RETAIL, PHARMACY, PARCEL, TRUCK] }
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        "200":
          description: Paginated orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Order" }
                  meta: { $ref: "#/components/schemas/Pagination" }

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Get order details
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Order with items, timeline, and rider
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  order: { $ref: "#/components/schemas/Order" }
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        quantity: { type: integer }
                        unitPriceKobo: { type: integer }
                        totalKobo: { type: integer }
                        notes: { type: string }
                  timeline:
                    type: array
                    items:
                      type: object
                      properties:
                        status: { type: string }
                        createdAt: { type: string, format: date-time }
                  rider:
                    nullable: true
                    type: object
                    properties:
                      id: { type: string }
                      firstName: { type: string }
                      lastName: { type: string }
                      phone: { type: string }
                      lat: { type: number }
                      lng: { type: number }
        "404":
          description: Order not found

  /orders/{id}/cancel:
    post:
      tags: [Orders]
      summary: Cancel an order
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Order cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  order: { $ref: "#/components/schemas/Order" }
        "404":
          description: Order not found
        "422":
          description: Order cannot be cancelled (already out for delivery or delivered)

