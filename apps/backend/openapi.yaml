            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/VendorAdminProfile" }
        "409":
          description: Email already in use
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /vendor-admin/me/settings:
    get:
      tags: [Vendor Admin — Auth]
      summary: Get own notification settings (all roles)
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Admin notification settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/VendorAdminSettings" }
    patch:
      tags: [Vendor Admin — Auth]
      summary: Update own notification settings (all roles)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                emailNotifications: { type: boolean }
                orderAlerts: { type: boolean }
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/VendorAdminSettings" }

  # ─ Categories (MANAGER+) ──────────────────────────────────────
  /vendor-admin/categories:
    get:
      tags: [Vendor Admin — Categories]
      summary: List own vendor's categories (MANAGER+)
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Categories with product counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/ProductCategory" }
    post:
      tags: [Vendor Admin — Categories]
      summary: Create category (MANAGER+)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, maxLength: 100 }
                description: { type: string, maxLength: 500 }
                imageUrl: { type: string, format: uri }
                isActive: { type: boolean, default: true }
                sortOrder: { type: integer, minimum: 0, default: 0 }
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/ProductCategory" }

  /vendor-admin/categories/{id}:
    get:
      tags: [Vendor Admin — Categories]
      summary: Get category by ID (MANAGER+)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Category detail with product count
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/ProductCategory" }
        "404":
          description: Category not found
    put:
      tags: [Vendor Admin — Categories]
      summary: Update category (MANAGER+)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, maxLength: 100 }
                description: { type: string, maxLength: 500, nullable: true }
                imageUrl: { type: string, format: uri, nullable: true }
                sortOrder: { type: integer, minimum: 0 }
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/ProductCategory" }
        "404":
          description: Category not found
    delete:
      tags: [Vendor Admin — Categories]
      summary: Delete category (MANAGER+)
      description: Fails with 409 if the category still has products.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
        "404":
          description: Category not found
        "409":
          description: Category still has products

  /vendor-admin/categories/{id}/active:
    patch:
      tags: [Vendor Admin — Categories]
      summary: Toggle category visibility (MANAGER+)
      description: |
        Setting `isActive: false` hides the entire category and all its products
        from customer-facing listings immediately.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isActive]
              properties:
                isActive: { type: boolean }
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/ProductCategory" }
        "404":
          description: Category not found

  # ─ Products (MANAGER+) ────────────────────────────────────────
  /vendor-admin/products:
    get:
      tags: [Vendor Admin — Products]
      summary: List products (MANAGER+)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: categoryId
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Paginated products including unavailable ones
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/ProductAdmin" }
                  total: { type: integer }
                  page: { type: integer }
                  limit: { type: integer }
    post:
      tags: [Vendor Admin — Products]
      summary: Create product (MANAGER+)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [categoryId, name, priceKobo]
              properties:
                categoryId: { type: string }
                name: { type: string, maxLength: 200 }
                description: { type: string, maxLength: 1000 }
                priceKobo: { type: integer, minimum: 1 }
                imageUrl: { type: string, format: uri }
                isAvailable: { type: boolean, default: true }
                stock: { type: integer, minimum: 0 }
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/ProductAdmin" }
        "404":
          description: Category not found or does not belong to this vendor

  /vendor-admin/products/{id}:
    get:
      tags: [Vendor Admin — Products]
      summary: Get product by ID (MANAGER+)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/ProductAdmin" }
        "404":
          description: Product not found
    put:
      tags: [Vendor Admin — Products]
      summary: Update product (MANAGER+)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                categoryId: { type: string }
                name: { type: string, maxLength: 200 }
                description: { type: string, nullable: true }
                priceKobo: { type: integer, minimum: 1 }
                imageUrl: { type: string, format: uri, nullable: true }
                isAvailable: { type: boolean }
                stock: { type: integer, minimum: 0, nullable: true }
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/ProductAdmin" }
        "404":
          description: Product or category not found
    delete:
      tags: [Vendor Admin — Products]
      summary: Delete product (MANAGER+)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
        "404":
          description: Product not found

  /vendor-admin/products/{id}/availability:
    patch:
      tags: [Vendor Admin — Products]
      summary: Toggle product availability (MANAGER+)
      description: |
        Customers will immediately stop seeing unavailable products.
        Use this to temporarily remove a sold-out or paused item.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isAvailable]
              properties:
                isAvailable: { type: boolean }
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/ProductAdmin" }
        "404":
          description: Product not found

  # ─ Orders (STAFF+) ────────────────────────────────────────────
  /vendor-admin/orders:
    get:
      tags: [Vendor Admin — Orders]
      summary: List orders for this vendor (STAFF+)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, ACCEPTED, PREPARING, READY_FOR_PICKUP, PICKED_UP, IN_TRANSIT, DELIVERED, CANCELLED, FAILED]
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Paginated orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/VendorOrder" }
                  total: { type: integer }
                  page: { type: integer }
                  limit: { type: integer }

  /vendor-admin/orders/{id}:
    get:
      tags: [Vendor Admin — Orders]
      summary: Get order detail (STAFF+)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Order with items, customer info, and event timeline
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/VendorOrder" }
        "404":
          description: Order not found

  /vendor-admin/orders/{id}/accept:
    patch:
      tags: [Vendor Admin — Orders]
      summary: Accept order — PENDING → ACCEPTED (STAFF+)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Order accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/VendorOrder" }
        "404":
          description: Order not found
        "409":
          description: Order is not in PENDING status

  /vendor-admin/orders/{id}/preparing:
    patch:
      tags: [Vendor Admin — Orders]
      summary: Mark order as preparing — ACCEPTED → PREPARING (STAFF+)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/VendorOrder" }
        "409":
          description: Invalid status transition

  /vendor-admin/orders/{id}/ready:
    patch:
      tags: [Vendor Admin — Orders]
      summary: Mark order ready for pickup — ACCEPTED/PREPARING → READY_FOR_PICKUP (STAFF+)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/VendorOrder" }
        "409":
          description: Invalid status transition

  /vendor-admin/orders/{id}/reject:
    patch:
      tags: [Vendor Admin — Orders]
      summary: Reject order — PENDING → CANCELLED (STAFF+)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Order rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/VendorOrder" }
        "409":
          description: Order is not in PENDING status

  /vendor-admin/orders/{id}/cancel:
    patch:
      tags: [Vendor Admin — Orders]
      summary: Cancel order — any active status → CANCELLED, refunds customer if paid (MANAGER+)
      description: >
        Cancels an order that hasn't reached a terminal state (DELIVERED, CANCELLED, FAILED).
        If the customer had already paid (paymentStatus = PAID), the full `totalKobo` is automatically
        credited to their Godrop wallet and the order's paymentStatus is set to REFUNDED.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Order cancelled. Refund issued to customer wallet if order was paid.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string, example: "Order cancelled and customer refunded if applicable" }
        "404":
          description: Order not found
        "409":
          description: Order is already in a terminal state (DELIVERED, CANCELLED, FAILED)

  # ─ Settings (view MANAGER+, update OWNER) ─────────────────────
  /vendor-admin/settings:
    get:
      tags: [Vendor Admin — Settings]
      summary: Get vendor settings (MANAGER+)
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Full vendor record
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/VendorSettings" }
    put:
      tags: [Vendor Admin — Settings]
      summary: Update vendor settings (OWNER only)
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, minLength: 2, maxLength: 100 }
                description: { type: string, maxLength: 500, nullable: true }
                phone:
                  type: string
                  pattern: '^\+234\d{10}$'
                email: { type: string, format: email }
                deliveryFeeKobo: { type: integer, minimum: 0 }
                estimatedMinutes: { type: integer, minimum: 1, maximum: 300 }
                isOpen: { type: boolean }
                cashOnDeliveryEnabled: { type: boolean, description: "Allow customers to pay cash on delivery" }
                openingHours: { type: object }
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/VendorSettings" }
        "403":
          description: Forbidden — requires OWNER role

  # ─ Vendor Wallet ──────────────────────────────────────────────

  /vendor-admin/wallet:
    get:
      tags: [Vendor Admin — Wallet]
      summary: Get vendor wallet balance
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Wallet balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  balanceKobo: { type: integer, example: 250000 }

  /vendor-admin/wallet/transactions:
    get:
      tags: [Vendor Admin — Wallet]
      summary: List wallet transactions (paginated)
      security: [{ BearerAuth: [] }]
      parameters:
        - { in: query, name: page, schema: { type: integer, default: 1 } }
        - { in: query, name: limit, schema: { type: integer, default: 20 } }
      responses:
        "200":
          description: Paginated transactions

  /vendor-admin/wallet/banks:
    get:
      tags: [Vendor Admin — Wallet]
      summary: List Nigerian banks (from Paystack)
      description: Returns a list of supported Nigerian banks with their codes for account setup.
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Bank list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  banks:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string, example: Access Bank }
                        code: { type: string, example: "044" }
                        slug: { type: string, example: access-bank }

  /vendor-admin/wallet/resolve-account:
    post:
      tags: [Vendor Admin — Wallet]
      summary: Resolve / verify a bank account number
      description: Calls Paystack to verify an account number and return the registered account name.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accountNumber, bankCode]
              properties:
                accountNumber: { type: string, minLength: 10, maxLength: 10, example: "0123456789" }
                bankCode: { type: string, example: "044" }
      responses:
        "200":
          description: Account verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  accountName: { type: string, example: JOHN DOE }
                  accountNumber: { type: string, example: "0123456789" }
        "422":
          description: Could not verify account number

  /vendor-admin/wallet/bank-account:
    get:
      tags: [Vendor Admin — Wallet]
      summary: Get saved bank account for withdrawals
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Bank account details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  account:
                    nullable: true
                    type: object
                    properties:
                      id: { type: string }
                      bankName: { type: string, example: Access Bank }
                      bankCode: { type: string, example: "044" }
                      accountNumber: { type: string, example: "0123456789" }
                      accountName: { type: string, example: JOHN DOE }
    post:
      tags: [Vendor Admin — Wallet]
      summary: Add or update bank account (OWNER only)
      description: |
        Upserts the vendor's bank account used for withdrawals.
        Audit-logged as `ADD_BANK_ACCOUNT` on first save, `UPDATE_BANK_ACCOUNT` on subsequent edits.
        Account number must be exactly 10 digits. Use `/resolve-account` first to verify the account name.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bankName, bankCode, accountNumber, accountName]
              properties:
                bankName: { type: string, example: Access Bank }
                bankCode: { type: string, example: "044" }
                accountNumber: { type: string, minLength: 10, maxLength: 10, example: "0123456789" }
                accountName: { type: string, example: JOHN DOE, description: "As returned by /resolve-account" }
      responses:
        "200":
          description: Bank account saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  account:
                    type: object
                    properties:
                      id: { type: string }
                      bankName: { type: string }
                      bankCode: { type: string }
                      accountNumber: { type: string }
                      accountName: { type: string }
        "422":
          description: Validation error (e.g. account number not 10 digits)

  /vendor-admin/wallet/withdraw:
    post:
      tags: [Vendor Admin — Wallet]
      summary: Request a wallet withdrawal (OWNER only)
      description: |
        Initiates a Paystack single transfer to the vendor's saved bank account and debits the wallet immediately.
        Requires the OWNER role — MANAGER and STAFF will receive 403.
        Minimum withdrawal: ₦100 (10,000 kobo). Amount must not exceed current wallet balance.
        Audit-logged as `WALLET_WITHDRAWAL`.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amountKobo]
              properties:
                amountKobo: { type: integer, minimum: 10000, example: 50000 }
      responses:
        "200":
          description: Transfer initiated and wallet debited
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string, example: Transfer initiated }
                  reference: { type: string, example: VWD-abc123 }
        "403":
          description: Forbidden — OWNER role required
        "422":
          description: Insufficient wallet balance or no bank account on file

  # ─ Team (view MANAGER+, manage OWNER) ─────────────────────────
  /vendor-admin/team:
    get:
      tags: [Vendor Admin — Team]
      summary: List team members (MANAGER+)
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: All team members for this vendor
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/TeamMember" }
    post:
      tags: [Vendor Admin — Team]
      summary: Invite team member (OWNER only)
      description: |
        Creates a MANAGER or STAFF account and sends a team invite email with a
        temporary password. The new member must change their password on first login.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, firstName, lastName, role]
              properties:
                email: { type: string, format: email }
                firstName: { type: string, maxLength: 50 }
                lastName: { type: string, maxLength: 50 }
                role:
                  type: string
                  enum: [MANAGER, STAFF]
      responses:
        "201":
          description: Team member created, invite email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/TeamMember" }
        "403":
          description: Forbidden — requires OWNER role
        "409":
          description: Email already registered

  /vendor-admin/team/{memberId}:
    patch:
      tags: [Vendor Admin — Team]
      summary: Change team member role (OWNER only)
      description: Cannot change the OWNER's role.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: memberId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [MANAGER, STAFF] }
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/TeamMember" }
        "403":
          description: Forbidden — requires OWNER role
        "404":
          description: Team member not found
        "409":
          description: Cannot change the role of the OWNER
    delete:
      tags: [Vendor Admin — Team]
      summary: Remove team member (OWNER only)
      description: Soft-deletes by setting `isActive = false`. Cannot remove the OWNER or yourself.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: memberId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Team member removed
        "403":
          description: Forbidden — requires OWNER role
        "404":
          description: Team member not found
        "409":
          description: Cannot remove the OWNER or yourself

  # ══════════════════════════════════════════════════════════════
  # SYSTEM ADMIN API  (prefix: /admin)
  # Token type: "admin" — obtain from POST /admin/login
  # Roles: SUPER_ADMIN > ADMIN
  # ══════════════════════════════════════════════════════════════

  /admin/login:
    post:
      tags: [Admin — Auth]
      summary: Admin login (system admin and vendor admin)
      description: |
        Unified login endpoint for all admin types. Accepts email + password
        and returns a JWT token valid for both system admins (8h) and vendor
        admins (7d). The `admin.type` field in the response indicates whether
        the caller is a `SYSTEM` or `VENDOR` admin.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: JWT token and admin profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  token: { type: string }
                  admin:
                    oneOf:
                      - $ref: "#/components/schemas/SystemAdminProfile"
                      - $ref: "#/components/schemas/VendorAdminProfile"
                    discriminator:
                      propertyName: type
                      mapping:
                        SYSTEM: "#/components/schemas/SystemAdminProfile"
                        VENDOR: "#/components/schemas/VendorAdminProfile"
        "401":
          description: Invalid credentials

  /admin/me:
    get:
      tags: [System Admin — Auth]
      summary: Get own system admin profile (ADMIN+)
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: System admin profile (password excluded)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/SystemAdminProfile" }

  /admin/me/change-password:
    post:
      tags: [System Admin — Auth]
      summary: Change own password
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword: { type: string }
                newPassword: { type: string, minLength: 8 }
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
        "400":
          description: Current password is incorrect
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /admin/me/profile:
    patch:
      tags: [System Admin — Auth]
      summary: Update own profile (firstName, lastName, email)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName: { type: string, minLength: 1, maxLength: 50 }
                lastName: { type: string, minLength: 1, maxLength: 50 }
                email: { type: string, format: email }
      responses:
        "200":
          description: Updated system admin profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/SystemAdminProfile" }
        "409":
          description: Email already in use
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /admin/me/settings:
    get:
      tags: [System Admin — Auth]
      summary: Get own notification/report settings
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Admin settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/SystemAdminSettings" }
    patch:
      tags: [System Admin — Auth]
      summary: Update own notification/report settings
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                emailNotifications: { type: boolean }
                weeklyReport: { type: boolean }
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/SystemAdminSettings" }

  # ─ Admin Management (SUPER_ADMIN only) ───────────────────────
  /admin/admins:
    get:
      tags: [System Admin — Admins]
      summary: List system admins (SUPER_ADMIN only)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Paginated list of system admins
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/SystemAdminProfile" }
                  total: { type: integer }
                  page: { type: integer }
                  limit: { type: integer }
        "403":
          description: Forbidden — requires SUPER_ADMIN role
    post:
      tags: [System Admin — Admins]
      summary: Create system admin (SUPER_ADMIN only)
      description: Creates a new system admin and sends them an email with their login credentials and a temporary password.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, firstName, lastName]
              properties:
                email: { type: string, format: email }
                firstName: { type: string, maxLength: 50 }
                lastName: { type: string, maxLength: 50 }
                role:
                  type: string
                  enum: [SUPER_ADMIN, ADMIN]
                  default: ADMIN
      responses:
        "201":
          description: Admin created — invite email sent with temporary password
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/SystemAdminProfile" }
        "403":
          description: Forbidden — requires SUPER_ADMIN role
        "409":
          description: Email already registered

  /admin/admins/{id}:
    patch:
      tags: [System Admin — Admins]
      summary: Update system admin (SUPER_ADMIN only)
      description: Can update name, active status, role, and email notification preferences.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName: { type: string, maxLength: 50 }
                lastName: { type: string, maxLength: 50 }
                isActive: { type: boolean }
                role: { type: string, enum: [SUPER_ADMIN, ADMIN] }
                receiveVendorEmails: { type: boolean, description: "Receive email when new vendor applications are submitted" }
                receiveRiderEmails: { type: boolean, description: "Receive email when new riders register" }
      responses:
        "200":
          description: Updated admin profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/SystemAdminProfile" }
        "403":
          description: Forbidden — requires SUPER_ADMIN role

  /admin/admins/{id}/email-prefs:
    patch:
      tags: [System Admin — Admins]
      summary: Update admin email notification preferences (SUPER_ADMIN only)
      description: |
        Toggle which automated email notifications an admin receives.
        - `receiveVendorEmails`: notified when a new vendor submits an application.
        - `receiveRiderEmails`: notified when a new rider registers (for KYC approval).
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                receiveVendorEmails:
                  type: boolean
                  description: Receive email when new vendor applications are submitted
                receiveRiderEmails:
                  type: boolean
                  description: Receive email when new riders register for KYC approval
      responses:
        "200":
          description: Updated admin preferences
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/SystemAdminProfile" }
        "403":
          description: Forbidden — requires SUPER_ADMIN role
        "404":
          description: Admin not found

  # ─ Vendor Management (ADMIN+) ─────────────────────────────────
  /admin/vendors:
    get:
      tags: [System Admin — Vendors]
      summary: List all vendors (ADMIN+)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [PENDING, APPROVED, REJECTED, SUSPENDED] }
        - in: query
          name: type
          schema: { type: string, enum: [RESTAURANT, GROCERY, RETAIL, PHARMACY] }
        - in: query
          name: search
          description: Searches by vendor name (case-insensitive)
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Paginated vendor list with owner info and counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/VendorSummary" }
                  total: { type: integer }
                  page: { type: integer }
                  limit: { type: integer }

  /admin/vendors/{id}:
    get:
      tags: [System Admin — Vendors]
      summary: Get vendor detail (ADMIN+)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Full vendor with all team members and counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/VendorSummary" }

  /admin/vendors/{id}/approve:
    patch:
      tags: [System Admin — Vendors]
      summary: Approve vendor (ADMIN+)
      description: |
        Sets status to APPROVED and `isActive = true`.
        Sends an approval email to the vendor owner.
        This action is audit-logged.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Vendor approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/VendorFull" }
        "409":
          description: Vendor is already approved

  /admin/vendors/{id}/reject:
    patch:
      tags: [System Admin — Vendors]
      summary: Reject vendor (ADMIN+)
      description: |
        Sets status to REJECTED and `isActive = false`. Stores the rejection reason.
        Sends a rejection email to the vendor owner.
        This action is audit-logged.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  example: "Incomplete documentation submitted"
      responses:
        "200":
          description: Vendor rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/VendorFull" }
        "409":
          description: Vendor is already rejected

  /admin/vendors/{id}/suspend:
    patch:
      tags: [System Admin — Vendors]
      summary: Suspend vendor (ADMIN+)
      description: |
        Sets status to SUSPENDED and `isActive = false`.
        The vendor immediately disappears from customer listings.
        This action is audit-logged.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Vendor suspended
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/VendorFull" }
        "409":
          description: Vendor is already suspended

  /admin/vendors/{id}/reinstate:
    patch:
      tags: [System Admin — Vendors]
      summary: Reinstate vendor (ADMIN+)
      description: |
        Sets status back to APPROVED and `isActive = true`.
        Use this to un-suspend a previously suspended vendor.
        This action is audit-logged.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Vendor reinstated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/VendorFull" }

  /admin/vendors/{id}/wallet:
    get:
      tags: [System Admin — Vendors]
      summary: Get vendor wallet balance (ADMIN+)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Vendor wallet balance in Kobo
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  balanceKobo: { type: integer, example: 150000 }
        "404":
          description: Vendor not found

  /admin/vendors/{id}/withdrawals:
    get:
      tags: [System Admin — Vendors]
      summary: List vendor withdrawal requests (ADMIN+)
      description: Returns a paginated list of all withdrawal requests made by a vendor, most recent first.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Vendor withdrawals
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        vendorId: { type: string }
                        amountKobo: { type: integer }
                        bankName: { type: string }
                        bankCode: { type: string }
                        accountNumber: { type: string }
                        accountName: { type: string }
                        reference: { type: string, nullable: true }
                        status:
                          type: string
                          enum: [PENDING, PROCESSING, COMPLETED, FAILED]
                        notes: { type: string, nullable: true }
                        processedAt: { type: string, format: date-time, nullable: true }
                        createdAt: { type: string, format: date-time }
                  meta:
                    $ref: "#/components/schemas/PaginationMeta"
        "404":
          description: Vendor not found

  # ─ Audit Logs (ADMIN+) ────────────────────────────────────────
  /admin/audit-logs:
    get:
      tags: [System Admin — Audit Logs]
      summary: Query audit logs (ADMIN+)
      description: |
        Returns a paginated, filterable audit trail of all actions taken by
        vendor admins and system admins. Sorted by most recent first.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: vendorId
          description: Filter by vendor
          schema: { type: string }
        - in: query
          name: adminId
          description: Filter by actor (vendor admin or system admin) ID
          schema: { type: string }
        - in: query
          name: action
          description: Partial match on action string (case-insensitive), e.g. "APPROVE"
          schema: { type: string }
        - in: query
          name: entity
          description: Partial match on entity name, e.g. "Vendor"
          schema: { type: string }
        - in: query
          name: from
          description: ISO 8601 datetime — log entries on or after this time
          schema: { type: string, format: date-time }
        - in: query
          name: to
          description: ISO 8601 datetime — log entries on or before this time
          schema: { type: string, format: date-time }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Paginated audit log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/AuditLog" }
                  total: { type: integer }
                  page: { type: integer }
                  limit: { type: integer }

  # ─ Orders (ADMIN+) ───────────────────────────────────────────
  /admin/orders:
    get:
      tags: [System Admin — Orders]
      summary: List all platform orders (ADMIN+)
      description: |
        Returns a paginated, filterable list of all orders across all vendors.
        Sorted by most recent first.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, ACCEPTED, PREPARING, READY_FOR_PICKUP, PICKED_UP, IN_TRANSIT, DELIVERED, CANCELLED, FAILED]
        - in: query
          name: type
          schema:
            type: string
            enum: [FOOD, GROCERY, RETAIL, PHARMACY, PARCEL, TRUCK]
        - in: query
          name: vendorId
          schema: { type: string }
        - in: query
          name: search
          description: Search by tracking code, customer name, or phone
          schema: { type: string }
        - in: query
          name: from
          description: "ISO date (YYYY-MM-DD) — orders created on or after this date"
          schema: { type: string, format: date }
        - in: query
          name: to
          description: "ISO date (YYYY-MM-DD) — orders created on or before this date"
          schema: { type: string, format: date }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Paginated platform orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/AdminOrder" }
                  total: { type: integer }
                  page: { type: integer }
                  limit: { type: integer }
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — requires ADMIN role or higher

  /admin/orders/{id}:
    get:
      tags: [System Admin — Orders]
      summary: Get order detail (ADMIN+)
      description: |
        Returns the full order record including customer, vendor, rider, line items,
        status timeline, and — for TRUCK orders — apartment type, loader count, and stops.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Full order detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/AdminOrder" }
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — requires ADMIN role or higher
        "404":
          description: Order not found

  /admin/orders/{id}/status:
    patch:
      tags: [System Admin — Orders]
      summary: Update order status (ADMIN+)
      description: |
        Manually advances or changes the status of any non-terminal order.
        Use this to progress a truck booking through its lifecycle
        (e.g. PENDING → ACCEPTED → IN_TRANSIT → DELIVERED) or to correct
        a stuck order on any order type.

        **Terminal statuses** (`DELIVERED`, `CANCELLED`, `FAILED`) cannot be overwritten —
        the endpoint returns 409 in that case.

        Every status change is recorded in the order's event timeline and is audit-logged.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [PENDING, ACCEPTED, PREPARING, READY_FOR_PICKUP, PICKED_UP, IN_TRANSIT, DELIVERED, CANCELLED, FAILED]
                  example: IN_TRANSIT
                note:
                  type: string
                  description: Optional note to attach to the timeline event
                  example: "Driver picked up the furniture — en route to Lekki"
      responses:
        "200":
          description: Order with updated status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/AdminOrder" }
        "404":
          description: Order not found
        "409":
          description: Order is already in a terminal state (DELIVERED, CANCELLED, FAILED)
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — requires ADMIN role or higher

  /admin/orders/{id}/cancel:
    patch:
      tags: [System Admin — Orders]
      summary: Force-cancel an order (ADMIN+)
      description: |
        Cancels any active order regardless of its current status.
        Use this to cancel a stuck or problematic order that the customer cannot cancel themselves.

        **Cannot cancel terminal orders** — returns 409 if the order is already
        `DELIVERED`, `CANCELLED`, or `FAILED`.

        This action is audit-logged.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  example: "Customer requested cancellation via support"
      responses:
        "200":
          description: Order cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/AdminOrder" }
        "404":
          description: Order not found
        "409":
          description: Order is already in a terminal state (DELIVERED, CANCELLED, FAILED)
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — requires ADMIN role or higher

  # ─ Customer Management ────────────────────────────────────────
  /admin/customers:
    get:
      tags: [System Admin — Customers]
      summary: List all customers (ADMIN+)
      description: |
        Returns a paginated list of all registered customers.
        Supports filtering by `status` and full-text `search` across name, phone, and email.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [ACTIVE, SUSPENDED, DEACTIVATED] }
          description: Filter by account status
        - in: query
          name: search
          schema: { type: string }
          description: Search by name, phone, or email
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Paginated customer list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/AdminCustomer" }
                  meta: { $ref: "#/components/schemas/Pagination" }
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — requires ADMIN role or higher

  /admin/customers/{id}:
    get:
      tags: [System Admin — Customers]
      summary: Get customer detail (ADMIN+)
      description: Returns full profile, wallet balance, and order/address counts for a single customer.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Customer detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/AdminCustomerDetail" }
        "404":
          description: Customer not found
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — requires ADMIN role or higher

  /admin/customers/{id}/orders:
    get:
      tags: [System Admin — Customers]
      summary: Get a customer's orders (ADMIN+)
      description: Returns a paginated list of all orders placed by the specified customer.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, ACCEPTED, PREPARING, READY_FOR_PICKUP, PICKED_UP, IN_TRANSIT, DELIVERED, CANCELLED, FAILED]
          description: Filter by order status
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Paginated order list for the customer
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/AdminOrder" }
                  meta: { $ref: "#/components/schemas/Pagination" }
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — requires ADMIN role or higher

  /admin/customers/{id}/status:
    patch:
      tags: [System Admin — Customers]
      summary: Update customer account status (ADMIN+)
      description: |
        Changes a customer's account status.

        | Status | Effect |
        |--------|--------|
        | `ACTIVE` | Normal access restored |
        | `SUSPENDED` | Account temporarily blocked — customer cannot log in or place orders |
        | `DEACTIVATED` | Account permanently closed |

        This action is audit-logged.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [ACTIVE, SUSPENDED, DEACTIVATED]
                  example: SUSPENDED
      responses:
        "200":
          description: Customer status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      id: { type: string }
                      firstName: { type: string }
                      lastName: { type: string }
                      phone: { type: string }
                      email: { type: string }
                      status: { type: string, enum: [ACTIVE, SUSPENDED, DEACTIVATED] }
                      updatedAt: { type: string, format: date-time }
        "404":
          description: Customer not found
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — requires ADMIN role or higher

  /admin/customers/{id}/wallet:
    get:
      tags: [System Admin — Customers]
      summary: Get customer wallet (ADMIN+)
      description: "Returns the customer's wallet including balance in Kobo. Returns `data: null` if the customer has no wallet yet."
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Customer wallet
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    nullable: true
                    allOf:
                      - $ref: "#/components/schemas/AdminWallet"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — requires ADMIN role or higher

  /admin/customers/{id}/wallet/transactions:
    get:
      tags: [System Admin — Customers]
      summary: Get customer wallet transactions (ADMIN+)
      description: Returns a paginated list of wallet transactions for the specified customer. Returns an empty list if the customer has no wallet.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: type
          schema: { type: string, enum: [TOPUP, PAYMENT, REFUND] }
          description: Filter by transaction type
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Paginated wallet transaction list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/AdminWalletTransaction" }
                  meta: { $ref: "#/components/schemas/Pagination" }
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — requires ADMIN role or higher

  # ─ Vendor Analytics ──────────────────────────────────────────
  /vendor-admin/analytics:
    get:
      tags: [Vendor Admin — Analytics]
      summary: Vendor performance analytics (MANAGER+)
      description: |
        Returns order counts, revenue, daily breakdown, and top products for the authenticated vendor.
        Dates are interpreted in **Africa/Lagos** (WAT, UTC+1) timezone.
        Defaults to the last 30 days when `from`/`to` are omitted.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date, example: "2026-01-01" }
          description: Start date (inclusive). Defaults to 30 days ago.
        - in: query
          name: to
          schema: { type: string, format: date, example: "2026-04-25" }
          description: End date (inclusive). Defaults to today.
      responses:
        "200":
          description: Analytics data for the vendor
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/VendorAnalytics" }
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — requires MANAGER role or higher

  # ─ System Analytics ───────────────────────────────────────────
  /admin/analytics:
    get:
      tags: [System Admin — Analytics]
      summary: Platform-wide analytics (ADMIN+)
      description: |
        Returns user growth, vendor counts, order volume, revenue, daily breakdown, and top vendors
        for the selected date range.
        Dates are interpreted in **Africa/Lagos** (WAT, UTC+1) timezone.
        Defaults to the last 30 days when `from`/`to` are omitted.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date, example: "2026-01-01" }
          description: Start date (inclusive). Defaults to 30 days ago.
        - in: query
          name: to
          schema: { type: string, format: date, example: "2026-04-25" }
          description: End date (inclusive). Defaults to today.
      responses:
        "200":
          description: Platform-wide analytics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: "#/components/schemas/SystemAnalytics" }
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — requires ADMIN role or higher

  # ─ Vendor Graph Data ──────────────────────────────────────────
  /vendor-admin/analytics/graph:
    get:
      tags: [Vendor Admin — Analytics]
      summary: Vendor time-series graph data (MANAGER+)
      description: |
        Returns order counts and revenue aggregated by the chosen granularity (day/week/month),
        suitable for rendering line or bar charts on the vendor dashboard.

        All buckets use **Africa/Lagos** (WAT, UTC+1) timezone.
        - `day` — each point covers one calendar day; `date` is `YYYY-MM-DD`.
        - `week` — each point covers Mon–Sun; `date` is the Monday of that ISO week.
        - `month` — each point covers a full calendar month; `date` is the 1st of that month.

        Defaults to the last 30 days with `granularity=day` when parameters are omitted.
        Only buckets that have at least one order are returned (no zero-fill).
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date, example: "2026-01-01" }
          description: "Start date, inclusive (YYYY-MM-DD). Defaults to 30 days ago."
        - in: query
          name: to
          schema: { type: string, format: date, example: "2026-04-25" }
          description: "End date, inclusive (YYYY-MM-DD). Defaults to today."
        - in: query
          name: granularity
          schema: { type: string, enum: [day, week, month], default: day }
          description: "Time bucket size. Defaults to `day`."
      responses:
        "200":
          description: Graph-ready time-series data for the vendor
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/VendorGraphData" }
        "400":
          description: Invalid query parameters
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — requires MANAGER role or higher

  # ─ System Graph Data ──────────────────────────────────────────
  /admin/analytics/graph:
    get:
      tags: [System Admin — Analytics]
      summary: Platform-wide time-series graph data (ADMIN+)
      description: |
        Returns platform order counts, revenue, and new user registrations aggregated by
        the chosen granularity (day/week/month), suitable for rendering line or bar charts
        on the ops dashboard.

        All buckets use **Africa/Lagos** (WAT, UTC+1) timezone.
        - `day` — each point covers one calendar day; `date` is `YYYY-MM-DD`.
        - `week` — each point covers Mon–Sun; `date` is the Monday of that ISO week.
        - `month` — each point covers a full calendar month; `date` is the 1st of that month.

        Defaults to the last 30 days with `granularity=day` when parameters are omitted.
        Buckets with no orders OR no new users are still included when the other metric is non-zero.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date, example: "2026-01-01" }
          description: "Start date, inclusive (YYYY-MM-DD). Defaults to 30 days ago."
        - in: query
          name: to
          schema: { type: string, format: date, example: "2026-04-25" }
          description: "End date, inclusive (YYYY-MM-DD). Defaults to today."
        - in: query
          name: granularity
          schema: { type: string, enum: [day, week, month], default: day }
          description: "Time bucket size. Defaults to `day`."
      responses:
        "200":
          description: Graph-ready time-series data for the platform
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/SystemGraphData" }
        "400":
          description: Invalid query parameters
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — requires ADMIN role or higher

  # ══════════════════════════════════════════════════════════════
  # RIDER APP API
  # ══════════════════════════════════════════════════════════════

  # ─ Rider Onboarding ──────────────────────────────────────────
  /rider/onboard:
    post:
      tags: [Rider App — Onboarding]
      summary: Apply as a rider (multipart/form-data with documents)
      description: |
        Public endpoint — no authentication required.

        A rider submits their personal details, vehicle information, guarantor info,
        and compliance documents in a single multipart/form-data request.

        **Required fields:** `firstName`, `lastName`, `phone`, `vehicleType`

        **File fields:**
        - `vehiclePapers` — Vehicle registration / roadworthiness papers. Up to **5 files** (images or PDF, max 10 MB each).
        - `governmentId` — Rider's government-issued ID (NIN slip, passport, driver's licence). **1 file**.
        - `guarantorGovernmentId` — Guarantor's government-issued ID. **1 file**. Automatically attached to the first guarantor entry.

        On success, the rider record is created with `kycStatus: SUBMITTED`.
        A system admin reviews and sets it to `VERIFIED` before the rider can accept orders.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [firstName, lastName, phone, vehicleType]
              properties:
                firstName: { type: string, maxLength: 50, example: "Emeka" }
                lastName: { type: string, maxLength: 50, example: "Okafor" }
                phone: { type: string, example: "+2348012345678", description: "Nigerian phone in E.164 format: +234XXXXXXXXXX" }
                email: { type: string, format: email }
                dateOfBirth: { type: string, example: "1995-06-15", description: "YYYY-MM-DD" }
                gender: { type: string, enum: [MALE, FEMALE, OTHER] }
                streetAddress: { type: string }
                city: { type: string, example: "Lagos" }
                state: { type: string, example: "Lagos" }
                vehicleType: { type: string, enum: [BICYCLE, MOTORCYCLE, CAR, VAN] }
                vehiclePlate: { type: string, example: "LND-234AB" }
                vehicleColor: { type: string, example: "Red" }
                vehicleModel: { type: string, example: "Bajaj Boxer" }
                vehicleYear: { type: integer, minimum: 1990, maximum: 2030 }
                driverLicenseNumber: { type: string }
                driverLicenseExpiry: { type: string, example: "2028-05-01", description: "YYYY-MM-DD" }
                vehicleInsuranceExpiry: { type: string, example: "2026-12-31", description: "YYYY-MM-DD" }
                bvn: { type: string, minLength: 11, maxLength: 11 }
                nin: { type: string, minLength: 11, maxLength: 11 }
                guarantors:
                  type: string
                  description: |
                    JSON-encoded array of RiderGuarantor objects (max 3).
                    Example: [{"name":"Chukwuemeka Obi","phone":"+2348012345678","address":"14 Admiralty Way, Lagos"}]
                vehiclePapers:
                  type: array
                  items: { type: string, format: binary }
                  description: "Vehicle papers (up to 5 files)"
                governmentId:
                  type: string
                  format: binary
                  description: "Rider's government-issued ID"
                guarantorGovernmentId:
                  type: string
                  format: binary
                  description: "Guarantor's government-issued ID"
      responses:
        "200":
          description: Application submitted — rider record created with kycStatus SUBMITTED
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/AdminRiderDetail" }
        "409":
          description: Phone number or email already registered

  # ─ Rider Auth ────────────────────────────────────────────────
  /rider/auth/request-otp:
    post:
      tags: [Rider App — Auth]
      summary: Request OTP for rider login
      description: Sends a 6-digit OTP to the rider's phone. Rider must already exist in the system (created by admin).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone: { type: string, example: "+2348012345678" }
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "OTP sent" }
                  expiresIn: { type: integer, example: 600, description: "Seconds until OTP expires" }
        "404":
          description: No rider account found for this phone number

  /rider/auth/verify-otp:
    post:
      tags: [Rider App — Auth]
      summary: Verify OTP and get access tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, otp]
              properties:
                phone: { type: string, example: "+2348012345678" }
                otp: { type: string, example: "482910" }
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  accessToken: { type: string }
                  refreshToken: { type: string }
                  rider: { $ref: "#/components/schemas/RiderProfile" }
        "400":
          description: Invalid or expired OTP
        "403":
          description: Rider account is inactive

  /rider/auth/refresh:
    post:
      tags: [Rider App — Auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        "200":
          description: New token pair issued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - $ref: "#/components/schemas/TokenPair"
        "401":
          description: Invalid or expired refresh token

  /rider/auth/logout:
    post:
      tags: [Rider App — Auth]
      summary: Logout and revoke refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        "200":
          description: Logged out successfully

  # ─ Rider Profile ─────────────────────────────────────────────
  /rider/me:
    get:
      tags: [Rider App — Profile]
      summary: Get own profile
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Rider profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/RiderProfile" }
        "401":
          description: Unauthorized
    patch:
      tags: [Rider App — Profile]
      summary: Update own profile (personal info and emergency contact)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName: { type: string, maxLength: 50 }
                lastName: { type: string, maxLength: 50 }
                email: { type: string, format: email, nullable: true }
                dateOfBirth: { type: string, example: "1995-06-15", description: "YYYY-MM-DD" }
                gender: { type: string, enum: [MALE, FEMALE, OTHER] }
                streetAddress: { type: string }
                city: { type: string }
                state: { type: string }
                landmark: { type: string }
                emergencyContactName: { type: string }
                emergencyContactPhone: { type: string }
                emergencyContactRelationship: { type: string }
                guarantors:
                  type: array
                  maxItems: 3
                  items:
                    $ref: "#/components/schemas/RiderGuarantor"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/RiderProfile" }

  /rider/me/avatar:
    patch:
      tags: [Rider App — Profile]
      summary: Update profile avatar URL
      description: Upload the image to Cloudinary first, then pass the resulting URL here.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [avatarUrl]
              properties:
                avatarUrl: { type: string, format: uri }
      responses:
        "200":
          description: Avatar updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/RiderProfile" }

  /rider/me/kyc:
    post:
      tags: [Rider App — Profile]
      summary: Submit KYC documents and onboarding info
      description: |
        Rider submits vehicle details, license, insurance, BVN/NIN, guarantor info, and compliance documents.
        The request must be sent as **`multipart/form-data`**.

        **File fields:**
        - `vehiclePapers` — Vehicle registration / roadworthiness papers. Up to **5 files** (images or PDF, max 10 MB each).
        - `governmentId` — Rider's government-issued ID (NIN slip, passport, driver's licence). **1 file**.
        - `guarantorGovernmentId` — Guarantor's government-issued ID. **1 file**. Automatically attached to the first guarantor entry.

        **Text fields** (all optional):
        - `vehicleType`, `vehiclePlate`, `vehicleColor`, `vehicleModel`, `vehicleYear`
        - `driverLicenseNumber`, `driverLicenseExpiry` (YYYY-MM-DD), `vehicleInsuranceExpiry` (YYYY-MM-DD)
        - `bvn` (11 digits), `nin` (11 digits)
        - `guarantors` — JSON-encoded array of `RiderGuarantor` objects (max 3)

        Files are uploaded to Cloudinary by the server. On success, `kycStatus` is set to `SUBMITTED`.
        A system admin then reviews and sets it to `VERIFIED` or `REJECTED`.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                vehicleType: { type: string, enum: [BICYCLE, MOTORCYCLE, CAR, VAN] }
                vehiclePlate: { type: string }
                vehicleColor: { type: string }
                vehicleModel: { type: string }
                vehicleYear: { type: integer, minimum: 1990, maximum: 2030 }
                driverLicenseNumber: { type: string }
                driverLicenseExpiry: { type: string, example: "2028-05-01", description: "YYYY-MM-DD" }
                vehicleInsuranceExpiry: { type: string, example: "2026-12-31", description: "YYYY-MM-DD" }
                bvn: { type: string, minLength: 11, maxLength: 11 }
                nin: { type: string, minLength: 11, maxLength: 11 }
                guarantors:
                  type: string
                  description: "JSON-encoded array of RiderGuarantor objects. Example: [{\"name\":\"Emeka Obi\",\"phone\":\"+2348012345678\",\"address\":\"14 Admiralty Way, Lagos\"}]"
                vehiclePapers:
                  type: array
                  items: { type: string, format: binary }
                  description: "Vehicle papers (up to 5 files — images or PDF, max 10 MB each)"
                governmentId:
                  type: string
                  format: binary
                  description: "Rider's government-issued ID (NIN slip, passport, driver's licence)"
                guarantorGovernmentId:
                  type: string
                  format: binary
                  description: "Guarantor's government-issued ID — attached to the first guarantor in the array"
      responses:
        "200":
          description: KYC submitted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/RiderProfile" }

  /rider/me/bank:
    patch:
      tags: [Rider App — Profile]
      summary: Update bank account details
      description: Bank account used for earnings withdrawal.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bankName, bankCode, accountNumber, accountName]
              properties:
                bankName: { type: string, example: "Guaranty Trust Bank" }
                bankCode: { type: string, example: "058" }
                accountNumber: { type: string, minLength: 10, maxLength: 10 }
                accountName: { type: string }
      responses:
        "200":
          description: Bank account updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/RiderProfile" }

  /rider/me/availability:
    patch:
      tags: [Rider App — Profile]
      summary: Toggle online/offline status
      description: "Riders must be online (isAvailable: true) to receive order assignments."
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isAvailable]
              properties:
                isAvailable: { type: boolean }
      responses:
        "200":
          description: Availability updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/RiderProfile" }

  /rider/me/location:
    post:
      tags: [Rider App — Profile]
      summary: Update current location (background polling)
      description: Use this endpoint for periodic background location updates. For real-time delivery tracking, use `POST /rider/orders/:id/location` which also broadcasts via WebSocket.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lat, lng]
              properties:
                lat: { type: number, minimum: -90, maximum: 90 }
                lng: { type: number, minimum: -180, maximum: 180 }
      responses:
        "200":
          description: Location updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "Location updated" }

  /rider/me/push-token:
    post:
      tags: [Rider App — Profile]
      summary: Register push notification token
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, platform]
              properties:
                token: { type: string }
                platform: { type: string, enum: [ios, android] }
      responses:
        "200":
          description: Token registered
    delete:
      tags: [Rider App — Profile]
      summary: Remove push notification token (on logout)
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        "200":
          description: Token removed

  # ─ Rider Orders ───────────────────────────────────────────────
  /rider/orders:
    get:
      tags: [Rider App — Orders]
      summary: List own orders
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, ACCEPTED, PREPARING, READY_FOR_PICKUP, PICKED_UP, IN_TRANSIT, DELIVERED, CANCELLED, FAILED]
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Paginated list of rider's orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/RiderOrder" }
                  meta: { $ref: "#/components/schemas/Pagination" }

  /rider/orders/active:
    get:
      tags: [Rider App — Orders]
      summary: Get active order
      description: Returns the single active order currently assigned to the rider (status ACCEPTED, READY_FOR_PICKUP, PICKED_UP, or IN_TRANSIT). Returns `null` in `data` if none.
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Active order or null
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    nullable: true
                    allOf:
                      - $ref: "#/components/schemas/RiderOrderDetail"

  /rider/orders/{id}:
    get:
      tags: [Rider App — Orders]
      summary: Get order detail
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Order detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/RiderOrderDetail" }
        "404":
          description: Order not found or not assigned to this rider

  /rider/orders/{id}/accept:
    patch:
      tags: [Rider App — Orders]
      summary: Accept order assignment
      description: Rider confirms they will fulfil the order. Logs an OrderEvent — does not change order status (vendor controls status progression for food orders).
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Order accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/RiderOrder" }
        "400":
          description: Order cannot be accepted at this stage
        "404":
          description: Order not found

  /rider/orders/{id}/reject:
    patch:
      tags: [Rider App — Orders]
      summary: Reject order assignment
      description: Rider declines the assignment. Clears the riderId so the dispatcher can reassign.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Order rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/RiderOrder" }
        "404":
          description: Order not found

  /rider/orders/{id}/picked-up:
    patch:
      tags: [Rider App — Orders]
      summary: Mark order as picked up
      description: Transitions status from ACCEPTED or READY_FOR_PICKUP → PICKED_UP.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Order marked as picked up
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/RiderOrder" }
        "400":
          description: Order cannot be marked as picked up at this stage
        "404":
          description: Order not found

  /rider/orders/{id}/in-transit:
    patch:
      tags: [Rider App — Orders]
      summary: Mark order as in transit
      description: Transitions status from PICKED_UP → IN_TRANSIT.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Order in transit
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/RiderOrder" }
        "400":
          description: Order must be in PICKED_UP status first
        "404":
          description: Order not found

  /rider/orders/{id}/delivered:
    patch:
      tags: [Rider App — Orders]
      summary: Mark order as delivered
      description: |
        Transitions status to DELIVERED. Automatically creates a `RiderEarning` record
        for 80% of the order's `deliveryFeeKobo` (configurable via `RIDER_EARNING_RATE` env var).
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                proofNote: { type: string, description: "Optional delivery note, e.g. left with neighbour" }
      responses:
        "200":
          description: Order delivered
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/RiderOrder" }
        "400":
          description: Order must be PICKED_UP or IN_TRANSIT to mark as delivered
        "404":
          description: Order not found

  /rider/orders/{id}/failed:
    patch:
      tags: [Rider App — Orders]
      summary: Mark delivery as failed
      description: Transitions status to FAILED. Stores the reason in `cancellationReason`.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string, example: "Recipient unreachable after 3 attempts" }
      responses:
        "200":
          description: Delivery marked as failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/RiderOrder" }
        "404":
          description: Order not found

  /rider/orders/{id}/location:
    post:
      tags: [Rider App — Orders]
      summary: Push real-time location update for active order
      description: Updates rider's stored lat/lng AND broadcasts `{ lat, lng, updatedAt }` to all WebSocket clients watching `ws://host/ws/orders/:id/tracking`.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lat, lng]
              properties:
                lat: { type: number, minimum: -90, maximum: 90 }
                lng: { type: number, minimum: -180, maximum: 180 }
      responses:
        "200":
          description: Location updated and broadcast to tracking clients
        "404":
          description: Order not found or not assigned to this rider

  # ─ Rider Earnings ─────────────────────────────────────────────
  /rider/earnings:
    get:
      tags: [Rider App — Earnings]
      summary: List earning records (per delivery)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Paginated earnings list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/RiderEarning" }
                  meta: { $ref: "#/components/schemas/Pagination" }

  /rider/earnings/summary:
    get:
      tags: [Rider App — Earnings]
      summary: Get earnings summary (today, week, month, total, pending balance)
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Earnings summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/RiderEarningsSummary" }

  /rider/earnings/withdrawal:
    post:
      tags: [Rider App — Earnings]
      summary: Request withdrawal of pending earnings to bank account
      description: |
        Creates a `RiderWithdrawal` record in PENDING status. A system admin then approves
        or rejects via `PATCH /admin/riders/:id/withdrawals/:withdrawalId`.

        Minimum withdrawal: ₦100 (10,000 kobo).
        Amount cannot exceed current pending balance.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amountKobo]
              properties:
                amountKobo: { type: integer, minimum: 10000, description: "Amount in kobo. Min ₦100 = 10,000 kobo" }
                bankName: { type: string, description: "Override saved bank name" }
                bankCode: { type: string, description: "Override saved bank code" }
                accountNumber: { type: string, description: "Override saved account number" }
                accountName: { type: string, description: "Override saved account name" }
      responses:
        "201":
          description: Withdrawal request created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/RiderWithdrawal" }
        "400":
          description: Insufficient balance or below minimum withdrawal amount

  /rider/earnings/withdrawals:
    get:
      tags: [Rider App — Earnings]
      summary: List withdrawal history
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Paginated withdrawal history
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/RiderWithdrawal" }
                  meta: { $ref: "#/components/schemas/Pagination" }

  # ─ Rider Notifications ────────────────────────────────────────
  /rider/notifications:
    get:
      tags: [Rider App — Notifications]
      summary: List notifications
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Paginated notifications list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/RiderNotification" }
                  meta: { $ref: "#/components/schemas/Pagination" }

  /rider/notifications/unread-count:
    get:
      tags: [Rider App — Notifications]
      summary: Get unread notification count
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  count: { type: integer }

  /rider/notifications/read-all:
    patch:
      tags: [Rider App — Notifications]
      summary: Mark all notifications as read
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: All marked as read

  /rider/notifications/{id}/read:
    patch:
      tags: [Rider App — Notifications]
      summary: Mark a notification as read
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Notification marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/RiderNotification" }
        "404":
          description: Notification not found

  # ══════════════════════════════════════════════════════════════
  # SYSTEM ADMIN — RIDERS
  # ══════════════════════════════════════════════════════════════

  /admin/riders/stats:
    get:
      tags: [System Admin — Riders]
      summary: Rider overview stats
      description: Returns total, active, available counts and KYC status breakdown. Minimum role ADMIN.
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Rider stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/RiderStats" }

  /admin/riders/available:
    get:
      tags: [System Admin — Riders]
      summary: List online and available riders (for manual dispatch)
      description: Returns riders where `isAvailable = true`, `isActive = true`, and `kycStatus = VERIFIED`. Minimum role ADMIN.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: lat
          schema: { type: number }
          description: Optional reference latitude for proximity sorting (future use)
        - in: query
          name: lng
          schema: { type: number }
          description: Optional reference longitude
      responses:
        "200":
          description: List of available riders
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        firstName: { type: string }
                        lastName: { type: string }
                        phone: { type: string }
                        vehicleType: { type: string, nullable: true }
                        vehiclePlate: { type: string, nullable: true }
                        lat: { type: number, nullable: true }
                        lng: { type: number, nullable: true }
                        rating: { type: number }

  /admin/riders:
    get:
      tags: [System Admin — Riders]
      summary: List all riders (paginated, searchable)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: search
          schema: { type: string }
          description: Search by name, phone, or email
        - in: query
          name: kycStatus
          schema: { type: string, enum: [PENDING, SUBMITTED, VERIFIED, REJECTED] }
        - in: query
          name: isActive
          schema: { type: string, enum: ["true", "false"] }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Paginated rider list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/AdminRiderSummary" }
                  meta: { $ref: "#/components/schemas/Pagination" }
    post:
      tags: [System Admin — Riders]
      summary: Create a new rider account
      description: Admin-created rider accounts. The rider uses their phone to log in via OTP. Minimum role ADMIN.
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [firstName, lastName, phone]
              properties:
                firstName: { type: string, maxLength: 50 }
                lastName: { type: string, maxLength: 50 }
                phone: { type: string, example: "+2348012345678" }
                email: { type: string, format: email }
                dateOfBirth: { type: string, example: "1995-06-15" }
                gender: { type: string, enum: [MALE, FEMALE, OTHER] }
                streetAddress: { type: string }
                city: { type: string }
                state: { type: string }
                vehicleType: { type: string, enum: [BICYCLE, MOTORCYCLE, CAR, VAN] }
                vehiclePlate: { type: string }
                vehicleColor: { type: string }
                vehicleModel: { type: string }
                vehicleYear: { type: integer }
                bankName: { type: string }
                bankCode: { type: string }
                accountNumber: { type: string }
                accountName: { type: string }
      responses:
        "201":
          description: Rider created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/AdminRiderDetail" }
        "409":
          description: Phone or email already exists

  /admin/riders/{id}:
    get:
      tags: [System Admin — Riders]
      summary: Get rider detail
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Rider detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/AdminRiderDetail" }
        "404":
          description: Rider not found
    patch:
      tags: [System Admin — Riders]
      summary: Update rider record (admin-side)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName: { type: string }
                lastName: { type: string }
                phone: { type: string }
                email: { type: string, format: email, nullable: true }
                vehicleType: { type: string, enum: [BICYCLE, MOTORCYCLE, CAR, VAN] }
                vehiclePlate: { type: string }
                isActive: { type: boolean }
      responses:
        "200":
          description: Rider updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/AdminRiderDetail" }
        "404":
          description: Rider not found
        "409":
          description: Phone or email conflict

  /admin/riders/{id}/kyc:
    patch:
      tags: [System Admin — Riders]
      summary: Update KYC status
      description: Approve or reject a rider's submitted KYC documents. Minimum role ADMIN.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [PENDING, SUBMITTED, VERIFIED, REJECTED] }
                notes: { type: string, description: "Reason for rejection (required when rejecting)" }
      responses:
        "200":
          description: KYC status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/AdminRiderDetail" }
        "404":
          description: Rider not found

  /admin/riders/{id}/toggle-active:
    patch:
      tags: [System Admin — Riders]
      summary: Activate or deactivate a rider account
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isActive]
              properties:
                isActive: { type: boolean }
      responses:
        "200":
          description: Rider active status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/AdminRiderDetail" }

  /admin/riders/{id}/assign-order:
    post:
      tags: [System Admin — Riders]
      summary: Manually assign an order to this rider
      description: Dispatchers use this to assign an order to a specific rider. Logs an audit event. Minimum role ADMIN.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId]
              properties:
                orderId: { type: string }
      responses:
        "200":
          description: Order assigned to rider
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/AdminOrder" }
        "400":
          description: Order cannot be assigned at this stage or rider is inactive
        "404":
          description: Order or rider not found

  /admin/riders/{id}/orders:
    get:
      tags: [System Admin — Riders]
      summary: Get a rider's order history
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, ACCEPTED, PREPARING, READY_FOR_PICKUP, PICKED_UP, IN_TRANSIT, DELIVERED, CANCELLED, FAILED]
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Paginated order list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/RiderOrder" }
                  meta: { $ref: "#/components/schemas/Pagination" }
        "404":
          description: Rider not found

  /admin/riders/{id}/earnings:
    get:
      tags: [System Admin — Riders]
      summary: Get a rider's earnings (list + total)
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Earnings with total summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/RiderEarning" }
                  meta: { $ref: "#/components/schemas/Pagination" }
                  totalEarnedKobo: { type: integer }
        "404":
          description: Rider not found

  /admin/riders/{id}/withdrawals/{withdrawalId}:
    patch:
      tags: [System Admin — Riders]
      summary: Approve or reject a rider's withdrawal request
      description: |
        - `approve`: Sets status to PROCESSING, marks all PENDING earnings as SETTLED.
        - `reject`: Sets status to FAILED. Balance remains available for a future withdrawal.

        Minimum role ADMIN. Audit-logged.
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
          description: Rider ID
        - in: path
          name: withdrawalId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: string, enum: [approve, reject] }
                notes: { type: string, description: "Optional note, e.g. bank transfer reference" }
      responses:
        "200":
          description: Withdrawal processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { $ref: "#/components/schemas/RiderWithdrawal" }
        "400":
          description: Withdrawal is not in PENDING status
        "404":
          description: Withdrawal not found

  # ─── System Admin — Email Messaging ─────────────────────────

  /admin/messaging/email/single:
    post:
      summary: Send email to a single address (ADMIN+)
      tags: [System Admin — Messaging]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, subject, html]
              properties:
                to: { type: string, format: email }
                subject: { type: string, maxLength: 200 }
                html: { type: string }
                text: { type: string }
      responses:
        "200":
          description: Email sent

  /admin/messaging/email/batch:
    post:
      summary: Send email to multiple addresses (ADMIN+)
      tags: [System Admin — Messaging]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emails, subject, html]
              properties:
                emails:
                  type: string
                  description: Comma-separated list of email addresses (max 500)
                  example: "a@example.com, b@example.com"
                subject: { type: string, maxLength: 200 }
                html: { type: string }
                text: { type: string }
      responses:
        "200":
          description: Batch complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
                  sent: { type: integer }
                  failed: { type: integer }
                  total: { type: integer }

  /admin/messaging/email/all-customers:
    post:
      summary: Broadcast email to all active customers (ADMIN+)
      tags: [System Admin — Messaging]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject, html]
              properties:
                subject: { type: string, maxLength: 200 }
                html: { type: string }
                text: { type: string }
      responses:
        "200":
          description: Broadcast complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
                  sent: { type: integer }
                  failed: { type: integer }
                  total: { type: integer }

  # ─── System Admin — Push Notifications ───────────────────────

  /admin/push/customers/broadcast:
    post:
      summary: Broadcast push notification to all customers
      tags: [System Admin — Push Notifications]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushNotificationPayload"
      responses:
        "200":
          description: Broadcast queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushSendResult"

  /admin/push/customers/batch:
    post:
      summary: Send push notification to a list of customers
      tags: [System Admin — Push Notifications]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/PushNotificationPayload"
                - type: object
                  required: [customerIds]
                  properties:
                    customerIds:
                      type: array
                      items: { type: string }
                      minItems: 1
                      description: Array of customer (user) IDs to notify
      responses:
        "200":
          description: Notifications sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushSendResult"

  /admin/push/customers/{id}:
    post:
      summary: Send push notification to a single customer
      tags: [System Admin — Push Notifications]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
          description: Customer (user) ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushNotificationPayload"
      responses:
        "200":
          description: Notification sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushSendResult"
        "404":
          description: Customer not found

  /admin/push/riders/broadcast:
    post:
      summary: Broadcast push notification to all riders
      tags: [System Admin — Push Notifications]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushNotificationPayload"
      responses:
        "200":
          description: Broadcast queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushSendResult"

  /admin/push/riders/batch:
    post:
      summary: Send push notification to a list of riders
      tags: [System Admin — Push Notifications]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/PushNotificationPayload"
                - type: object
                  required: [riderIds]
                  properties:
                    riderIds:
                      type: array
                      items: { type: string }
                      minItems: 1
                      description: Array of rider IDs to notify
      responses:
        "200":
          description: Notifications sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushSendResult"

  /admin/push/riders/{id}:
    post:
      summary: Send push notification to a single rider
      tags: [System Admin — Push Notifications]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
          description: Rider ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushNotificationPayload"
      responses:
        "200":
          description: Notification sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushSendResult"
        "404":
          description: Rider not found

# ─── WebSocket ────────────────────────────────────────────────
# Connect to: ws://host/ws/orders/:orderId/tracking
# The server broadcasts JSON payloads whenever the rider's location changes.
# No authentication is enforced at the WS layer in the current implementation.

# ─── Tags ─────────────────────────────────────────────────────
tags:
  # Public
  - name: Config
    description: "Public platform configuration — delivery fees, service charges, Paystack keys, and vendor payment options. No authentication required."
  # Customer
  - name: Auth
    description: Phone OTP authentication flow
  - name: Profile
    description: Customer profile and saved addresses
  - name: Wallet
    description: Godrop wallet and top-up
  - name: Payments
    description: Order payments via Paystack
  - name: Food
    description: Restaurants and food delivery
  - name: Grocery
    description: Grocery stores and products
  - name: Retail
    description: Retail stores and products
  - name: Pharmacy
    description: Pharmacies and medicines
  - name: Parcel
    description: On-demand parcel delivery
  - name: Truck
    description: Truck booking for relocation
  - name: Orders
    description: Unified order management
  - name: Tracking
    description: "Real-time order tracking (REST poll: GET /orders/:id/tracking; WebSocket push: ws://host/ws/orders/:id/tracking)"
  - name: Notifications
    description: Push notifications
  - name: Promotions
    description: Promo codes and banners
  # Admin
  - name: Admin — Auth
    description: "Unified login for system admins and vendor admins. POST /admin/login returns a JWT and admin profile with a type field (SYSTEM or VENDOR)."
  # Vendor
  - name: Vendor Onboarding
    description: Public endpoint to apply as a vendor. No authentication required.
  - name: Vendor Admin — Auth
    description: "Vendor admin profile. Authenticate via POST /admin/login."
  - name: Vendor Admin — Categories
    description: "Product category management. Minimum role: MANAGER."
  - name: Vendor Admin — Products
    description: "Product CRUD and availability toggle. Minimum role: MANAGER."
  - name: Vendor Admin — Orders
    description: "Order acceptance and status updates. Minimum role: STAFF."
  - name: Vendor Admin — Settings
    description: "Vendor profile and operational settings. View: MANAGER+. Update: OWNER."
  - name: Vendor Admin — Wallet
    description: "Vendor wallet — balance, transaction history, bank account management, and withdrawal requests. All vendor admin roles."
  - name: Vendor Admin — Team
    description: "Team member management. View: MANAGER+. Invite/update/remove: OWNER."
  # System Admin
  - name: System Admin — Auth
    description: "System admin profile. Authenticate via POST /admin/login (token expires in 8 hours)."
  - name: System Admin — Admins
    description: "System admin user management. Minimum role: SUPER_ADMIN."
  - name: System Admin — Vendors
    description: "Vendor approval, rejection, suspension, and reinstatement. Minimum role: ADMIN."
  - name: System Admin — Audit Logs
    description: "Immutable audit trail of all vendor admin and system admin actions. Minimum role: ADMIN."
  - name: System Admin — Orders
    description: "Platform-wide order browsing, full detail view, status updates, and force-cancel. Minimum role: ADMIN."
  - name: System Admin — Customers
    description: "Customer account management — list, detail, orders, status changes, wallet and transactions. Minimum role: ADMIN."
  - name: Vendor Admin — Analytics
    description: "Vendor performance analytics — order counts, revenue, top products. Minimum role: MANAGER."
  - name: System Admin — Analytics
    description: "Platform-wide analytics — users, vendors, orders, revenue, top vendors. Minimum role: ADMIN."
  # Rider App
  - name: Rider App — Auth
    description: "Phone OTP login flow for riders. Riders are created by system admins; they log in with their registered phone number."
  - name: Rider App — Profile
    description: "Rider profile management, KYC submission, bank account, availability toggle, and location updates."
  - name: Rider App — Orders
    description: "Order management from the rider's perspective — view assignments, accept/reject, mark pickup/delivery, push live location."
  - name: Rider App — Earnings
    description: "Per-delivery earning records, summary dashboard (today/week/month/total), and withdrawal requests."
  - name: Rider App — Notifications
    description: "In-app push notifications for the rider app."
  # System Admin Riders
  - name: System Admin — Riders
    description: "Rider account management, KYC review, manual order dispatch, earnings overview, and withdrawal processing. Minimum role: ADMIN."
  - name: System Admin — Push Notifications
    description: "Send FCM push notifications to individual customers or riders, a batch by IDs, or broadcast to all. Minimum role: ADMIN."
