openapi: 3.0.3
info:
  title: Godrop API
  description: |
    On-demand delivery and logistics platform for Nigeria.

    **Authentication domains:**
    - **Customer API** — Phone OTP → JWT. Pass token as `Authorization: Bearer <token>`. Payload: `{ userId }`.
    - **Rider App API** — Phone OTP → JWT. Same header. Payload: `{ riderId, type: "rider" }`.
    - **Vendor Admin API** — Email + password → JWT. Same header. Token payload contains `type: "admin"`.
    - **System Admin API** — Email + password → JWT. Same header. Token payload contains `type: "admin"`.

    **Currency:** All monetary amounts are in **Kobo** (₦ × 100). Never Naira floats.
    **Phone:** E.164 format, e.g. `+2348012345678`.

    **Response envelope:**
    - Success: `{ "success": true, ...fields }` — fields vary by endpoint (see each response schema).
    - Error: `{ "success": false, "error": "message" }`.
    - Single-entity detail responses wrap the entity in a `data` key.
    - Paginated list responses return `data` (array) + `meta` (pagination) at the top level.
  version: 1.0.0
  contact:
    name: Godrop Engineering
    email: dev@godrop.ng

servers:
  - url: https://api.godrop.ng/v1
    description: Production
  - url: https://godrop-production.up.railway.app/api/v1
    description: Staging
  - url: http://localhost:4000/api/v1
    description: Local development

# ─── Security ─────────────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Used by all three auth domains (customer, vendor admin, system admin). Each token encodes a `type` claim."

  schemas:
    # ─ Primitives ─────────────────────────────────────────────
    Pagination:
      type: object
      properties:
        page: { type: integer, example: 1 }
        limit: { type: integer, example: 20 }
        total: { type: integer, example: 143 }
        totalPages: { type: integer, example: 8 }

    ApiSuccess:
      type: object
      properties:
        success: { type: boolean, example: true }

    ApiError:
      type: object
      properties:
        success: { type: boolean, example: false }
        error: { type: string }

    PushNotificationPayload:
      type: object
      required: [title, body]
      properties:
        title:
          type: string
          example: "Order Update"
        body:
          type: string
          example: "Your order has been picked up."
        data:
          type: object
          additionalProperties: { type: string }
          description: Optional key-value pairs delivered as FCM data payload (string values only)
          example: { type: "ORDER_UPDATE", orderId: "clxxx" }

    PushSendResult:
      type: object
      properties:
        success: { type: boolean, example: true }
        message: { type: string, example: "Notification sent" }
        successCount: { type: integer, example: 42, description: "Number of tokens that received the message" }
        failureCount: { type: integer, example: 2, description: "Number of tokens that failed (stale tokens are auto-removed)" }

    # ─ Customer Auth ──────────────────────────────────────────
    TokenPair:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }

    # ─ Customer Profile ───────────────────────────────────────
    User:
      type: object
      properties:
        id: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        phone: { type: string, example: "+2348012345678" }
        email: { type: string, format: email }
        avatarUrl: { type: string }
        walletBalanceKobo: { type: integer }

    Address:
      type: object
      properties:
        id: { type: string }
        label: { type: string, example: "Home" }
        address: { type: string }
        lat: { type: number }
        lng: { type: number }
        isDefault: { type: boolean }

    # ─ Wallet ─────────────────────────────────────────────────
    WalletTransaction:
      type: object
      properties:
        id: { type: string }
        type: { type: string, enum: [TOPUP, PAYMENT, REFUND] }
        amountKobo: { type: integer }
        reference: { type: string }
        description: { type: string }
        createdAt: { type: string, format: date-time }

    # ─ Vendors (customer-facing) ──────────────────────────────
    Restaurant:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        logoUrl: { type: string }
        cuisines: { type: array, items: { type: string } }
        rating: { type: number }
        deliveryFeeKobo: { type: integer }
        estimatedMinutes: { type: integer }
        isOpen: { type: boolean }

    MenuItem:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        priceKobo: { type: integer }
        imageUrl: { type: string }
        isAvailable: { type: boolean }

    Product:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        priceKobo: { type: integer }
        imageUrl: { type: string }
        stock: { type: integer }

    Review:
      type: object
      properties:
        id: { type: string }
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string }
        createdAt: { type: string, format: date-time }

    # ─ Orders ─────────────────────────────────────────────────
    Order:
      type: object
      properties:
        id: { type: string }
        trackingCode: { type: string, example: "GD-261234567" }
        type:
          type: string
          enum: [FOOD, GROCERY, RETAIL, PHARMACY, PARCEL, TRUCK]
        status:
          type: string
          enum: [PENDING, ACCEPTED, PREPARING, READY_FOR_PICKUP, PICKED_UP, IN_TRANSIT, DELIVERED, CANCELLED, FAILED]
        totalKobo: { type: integer }
        createdAt: { type: string, format: date-time }

    ParcelVehicleType:
      type: object
      properties:
        id: { type: string }
        name: { type: string, example: "Motorcycle" }
        description: { type: string, example: "Best for small parcels under 5 kg" }
        imageUrl: { type: string }
        baseFeeKobo: { type: integer, example: 50000, description: "Fixed base fee in Kobo (₦500)" }
        perKmKobo: { type: integer, example: 8000, description: "Cost per kilometre in Kobo (₦80)" }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    TruckType:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        capacity: { type: string }
        imageUrl: { type: string }
        baseFeeKobo: { type: integer }
        perKmKobo: { type: integer }
        isActive: { type: boolean }

    ApartmentType:
      type: object
      properties:
        id: { type: string }
        name: { type: string, example: "2 Bedroom Flat" }
        description: { type: string }
        priceKobo: { type: integer, example: 8000000 }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    TruckPricingConfig:
      type: object
      properties:
        id: { type: string, example: "singleton" }
        perKmKobo: { type: integer, example: 15000, description: "Cost per kilometre in Kobo" }
        perLoaderKobo: { type: integer, example: 500000, description: "Cost per loader in Kobo" }
        updatedAt: { type: string, format: date-time }

    TruckPricingSummary:
      type: object
      properties:
        apartmentTypes:
          type: array
          items: { $ref: "#/components/schemas/ApartmentType" }
        perKmKobo: { type: integer, example: 15000 }
        perLoaderKobo: { type: integer, example: 500000 }

    Notification:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        body: { type: string }
        isRead: { type: boolean }
        createdAt: { type: string, format: date-time }

    Banner:
      type: object
      properties:
        id: { type: string }
        imageUrl: { type: string }
        title: { type: string }
        linkType: { type: string }
        linkValue: { type: string }

    LocationInput:
      type: object
      required: [lat, lng, address]
      properties:
        lat: { type: number }
        lng: { type: number }
        address: { type: string }

    PriceBreakdownParcel:
      type: object
      properties:
        deliveryFeeKobo: { type: integer, description: "Base fee + distance cost in Kobo" }
        serviceFeeKobo: { type: integer, description: "Fixed platform service fee in Kobo" }
        totalKobo: { type: integer }
        distanceKm: { type: number, description: "Straight-line distance between pickup and dropoff" }

    PriceBreakdownTruck:
      type: object
      properties:
        apartmentCostKobo: { type: integer, description: "Fixed cost for the apartment type" }
        distanceKm: { type: number, description: "Total route distance in km" }
        kmCostKobo: { type: integer, description: "Distance cost (distanceKm × perKmKobo)" }
        loadersCostKobo: { type: integer, description: "Loaders cost (numLoaders × perLoaderKobo)" }
        totalKobo: { type: integer }

    # ─ Vendor Onboarding / Admin ──────────────────────────────
    VendorAdminProfile:
      type: object
      properties:
        id: { type: string }
        email: { type: string, format: email }
        firstName: { type: string }
        lastName: { type: string }
        role:
          type: string
          enum: [OWNER, MANAGER, STAFF]
        isActive: { type: boolean }
        vendorId: { type: string }
        vendor: { $ref: "#/components/schemas/VendorFull" }
        createdAt: { type: string, format: date-time }

    VendorFull:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        type:
          type: string
          enum: [RESTAURANT, GROCERY, RETAIL, PHARMACY]
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED, SUSPENDED]
        description: { type: string }
        logoUrl: { type: string }
        coverUrl: { type: string }
        address: { type: string }
        lat: { type: number }
        lng: { type: number }
        phone: { type: string }
        email: { type: string, format: email }
        cuisines: { type: array, items: { type: string } }
        rating: { type: number }
        ratingCount: { type: integer }
        deliveryFeeKobo: { type: integer }
        estimatedMinutes: { type: integer }
        isOpen: { type: boolean }
        isActive: { type: boolean }
        openingHours: { type: object }
        rejectionReason: { type: string }
        documents:
          type: object
          description: Cloudinary URLs of uploaded compliance documents (only present for vendors that submitted them)
          properties:
            businessRegistrationUrl: { type: string, format: uri }
            governmentIdUrl: { type: string, format: uri }
            utilityBillUrl: { type: string, format: uri }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ProductCategory:
      type: object
      properties:
        id: { type: string }
        vendorId: { type: string }
        name: { type: string }
        description: { type: string }
        imageUrl: { type: string }
        isActive: { type: boolean }
        sortOrder: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        _count:
          type: object
          properties:
            products: { type: integer }

    ProductAdmin:
      type: object
      properties:
        id: { type: string }
        categoryId: { type: string }
        category:
          type: object
          properties:
            id: { type: string }
            name: { type: string }
        name: { type: string }
        description: { type: string }
        priceKobo: { type: integer }
        imageUrl: { type: string }
        isAvailable: { type: boolean }
        stock: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    VendorOrder:
      type: object
      properties:
        id: { type: string }
        trackingCode: { type: string }
        status:
          type: string
          enum: [PENDING, ACCEPTED, PREPARING, READY_FOR_PICKUP, PICKED_UP, IN_TRANSIT, DELIVERED, CANCELLED, FAILED]
        type:
          type: string
          enum: [FOOD, GROCERY, RETAIL, PHARMACY, PARCEL, TRUCK]
        items:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              quantity: { type: integer }
              unitPriceKobo: { type: integer }
              totalKobo: { type: integer }
              notes: { type: string }
        customer:
          type: object
          properties:
            firstName: { type: string }
            lastName: { type: string }
            phone: { type: string }
        subtotalKobo: { type: integer }
        deliveryFeeKobo: { type: integer }
        serviceFeeKobo: { type: integer }
        discountKobo: { type: integer }
        totalKobo: { type: integer }
        paymentMethod: { type: string, enum: [CARD, WALLET, CASH, WALLET_CARD] }
        paymentStatus: { type: string, enum: [PENDING, PAID, REFUNDED, FAILED] }
        notes: { type: string }
        createdAt: { type: string, format: date-time }

    AdminCustomer:
      type: object
      description: Customer record as seen by system admins (list view)
      properties:
        id: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        phone: { type: string, example: "+2348012345678" }
        email: { type: string, format: email, nullable: true }
        avatarUrl: { type: string, nullable: true }
        isVerified: { type: boolean }
        status:
          type: string
          enum: [ACTIVE, SUSPENDED, DEACTIVATED]
        createdAt: { type: string, format: date-time }
        wallet:
          type: object
          nullable: true
          properties:
            balanceKobo: { type: integer }
        _count:
          type: object
          properties:
            orders: { type: integer }

    AdminCustomerDetail:
      type: object
      description: Full customer profile returned to system admins (detail view)
      properties:
        id: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        phone: { type: string, example: "+2348012345678" }
        email: { type: string, format: email, nullable: true }
        avatarUrl: { type: string, nullable: true }
        referralCode: { type: string, nullable: true }
        isVerified: { type: boolean }
        status:
          type: string
          enum: [ACTIVE, SUSPENDED, DEACTIVATED]
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        wallet:
          type: object
          nullable: true
          properties:
            id: { type: string }
            balanceKobo: { type: integer }
            createdAt: { type: string, format: date-time }
        _count:
          type: object
          properties:
            orders: { type: integer }
            addresses: { type: integer }

    AdminWallet:
      type: object
      description: Customer wallet with owner summary
      properties:
        id: { type: string }
        balanceKobo: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        user:
          type: object
          properties:
            id: { type: string }
            firstName: { type: string }
            lastName: { type: string }
            phone: { type: string }

    AdminWalletTransaction:
      type: object
      properties:
        id: { type: string }
        walletId: { type: string }
        type:
          type: string
          enum: [TOPUP, PAYMENT, REFUND]
        amountKobo: { type: integer }
        reference: { type: string, nullable: true }
        description: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    AdminOrder:
      type: object
      description: Full order record returned to system admins
      properties:
        id: { type: string }
        trackingCode: { type: string, example: "GD-261234567" }
        status:
          type: string
          enum: [PENDING, ACCEPTED, PREPARING, READY_FOR_PICKUP, PICKED_UP, IN_TRANSIT, DELIVERED, CANCELLED, FAILED]
        type:
          type: string
          enum: [FOOD, GROCERY, RETAIL, PHARMACY, PARCEL, TRUCK]
        vendor:
          type: object
          nullable: true
          properties:
            id: { type: string }
            name: { type: string }
            type: { type: string, enum: [RESTAURANT, GROCERY, RETAIL, PHARMACY] }
        customer:
          type: object
          properties:
            id: { type: string }
            firstName: { type: string }
            lastName: { type: string }
            phone: { type: string }
        rider:
          type: object
          nullable: true
          properties:
            id: { type: string }
            firstName: { type: string }
            lastName: { type: string }
            phone: { type: string }
            lat: { type: number, nullable: true }
            lng: { type: number, nullable: true }
        items:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              quantity: { type: integer }
              unitPriceKobo: { type: integer }
              totalKobo: { type: integer }
              notes: { type: string }
        timeline:
          type: array
          description: Ordered history of status transitions
          items:
            type: object
            properties:
              status: { type: string }
              description: { type: string }
              createdAt: { type: string, format: date-time }
        apartmentType:
          type: object
          nullable: true
          description: Present only for TRUCK orders
          properties:
            id: { type: string }
            name: { type: string, example: "2 Bedroom Flat" }
            priceKobo: { type: integer }
        numLoaders: { type: integer, nullable: true, description: "Number of loaders requested (TRUCK orders)" }
        stops:
          type: array
          nullable: true
          description: Intermediate stops (TRUCK orders)
          items:
            type: object
            properties:
              lat: { type: number }
              lng: { type: number }
              address: { type: string }
        pickupAddress: { type: string }
        pickupLat: { type: number }
        pickupLng: { type: number }
        dropoffAddress: { type: string }
        dropoffLat: { type: number }
        dropoffLng: { type: number }
        packageDescription: { type: string, nullable: true, description: "PARCEL orders" }
        weightKg: { type: number, nullable: true, description: "PARCEL orders" }
        sizeCategory: { type: string, nullable: true, description: "PARCEL orders" }
        recipientName: { type: string, nullable: true, description: "PARCEL orders" }
        recipientPhone: { type: string, nullable: true, description: "PARCEL orders" }
        subtotalKobo: { type: integer }
        deliveryFeeKobo: { type: integer }
        serviceFeeKobo: { type: integer }
        discountKobo: { type: integer }
        totalKobo: { type: integer }
        paymentMethod: { type: string, enum: [CARD, WALLET, CASH, WALLET_CARD] }
        paymentStatus: { type: string, enum: [PENDING, PAID, REFUNDED, FAILED] }
        scheduledAt: { type: string, format: date-time, nullable: true }
        estimatedMinutes: { type: integer, nullable: true }
        notes: { type: string, nullable: true }
        cancellationReason: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    TeamMember:
      type: object
      properties:
        id: { type: string }
        email: { type: string, format: email }
        firstName: { type: string }
        lastName: { type: string }
        role: { type: string, enum: [OWNER, MANAGER, STAFF] }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }

    VendorSettings:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        phone: { type: string }
        email: { type: string }
        deliveryFeeKobo: { type: integer }
        estimatedMinutes: { type: integer }
        isOpen: { type: boolean }
        openingHours: { type: object }

    VendorAdminSettings:
      type: object
      properties:
        emailNotifications: { type: boolean, example: true }
        orderAlerts: { type: boolean, example: true, description: "Receive email on new incoming orders" }

    SystemAdminSettings:
      type: object
      properties:
        emailNotifications: { type: boolean, example: true }
        weeklyReport: { type: boolean, example: true, description: "Receive weekly platform summary email" }

    # ─ System Admin ───────────────────────────────────────────
    SystemAdminProfile:
      type: object
      properties:
        id: { type: string }
        email: { type: string, format: email }
        firstName: { type: string }
        lastName: { type: string }
        role: { type: string, enum: [SUPER_ADMIN, ADMIN] }
        isActive: { type: boolean }
        receiveVendorEmails: { type: boolean, description: "Receives email when new vendor applications are submitted" }
        receiveRiderEmails: { type: boolean, description: "Receives email when new riders register for KYC approval" }
        createdAt: { type: string, format: date-time }

    VendorSummary:
      type: object
      description: Vendor list item returned to system admins
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string, enum: [RESTAURANT, GROCERY, RETAIL, PHARMACY] }
        status: { type: string, enum: [PENDING, APPROVED, REJECTED, SUSPENDED] }
        email: { type: string }
        phone: { type: string }
        address: { type: string }
        rating: { type: number }
        isOpen: { type: boolean }
        isActive: { type: boolean }
        admins:
          type: array
          description: Owner account only
          items:
            type: object
            properties:
              id: { type: string }
              email: { type: string }
              firstName: { type: string }
              lastName: { type: string }
        _count:
          type: object
          properties:
            orders: { type: integer }
            categories: { type: integer }
        createdAt: { type: string, format: date-time }

    AuditLog:
      type: object
      properties:
        id: { type: string }
        admin:
          type: object
          nullable: true
          properties:
            id: { type: string }
            email: { type: string }
            firstName: { type: string }
            lastName: { type: string }
        vendor:
          type: object
          nullable: true
          properties:
            id: { type: string }
            name: { type: string }
        action: { type: string, example: "APPROVE_VENDOR" }
        entity: { type: string, example: "Vendor" }
        entityId: { type: string }
        oldValues: { type: object }
        newValues: { type: object }
        ipAddress: { type: string }
        userAgent: { type: string }
        createdAt: { type: string, format: date-time }

    VendorAnalytics:
      type: object
      properties:
        summary:
          type: object
          properties:
            totalOrders: { type: integer, example: 120 }
            completedOrders: { type: integer, example: 98 }
            cancelledOrders: { type: integer, example: 8 }
            totalRevenueKobo: { type: integer, example: 24000000, description: "Sum of subtotalKobo for PAID orders" }
            avgOrderValueKobo: { type: integer, example: 244897 }
        ordersByStatus:
          type: array
          items:
            type: object
            properties:
              status: { type: string, enum: [PENDING, ACCEPTED, PREPARING, READY_FOR_PICKUP, PICKED_UP, IN_TRANSIT, DELIVERED, CANCELLED, FAILED] }
              count: { type: integer }
        revenueByDay:
          type: array
          items:
            type: object
            properties:
              date: { type: string, format: date, example: "2026-01-15" }
              orders: { type: integer }
              revenueKobo: { type: integer }
        topProducts:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              orders: { type: integer }
              revenueKobo: { type: integer }

    SystemAnalytics:
      type: object
      properties:
        summary:
          type: object
          properties:
            totalUsers: { type: integer }
            newUsers: { type: integer, description: "New users in the selected date range" }
            totalVendors: { type: integer }
            activeVendors: { type: integer, description: "Vendors with status APPROVED" }
            pendingVendors: { type: integer }
            totalOrders: { type: integer }
            completedOrders: { type: integer }
            totalRevenueKobo: { type: integer, description: "Sum of totalKobo for all PAID orders" }
        ordersByStatus:
          type: array
          items:
            type: object
            properties:
              status: { type: string }
              count: { type: integer }
        ordersByType:
          type: array
          items:
            type: object
            properties:
              type: { type: string, enum: [FOOD, GROCERY, RETAIL, PHARMACY, PARCEL, TRUCK] }
              count: { type: integer }
              revenueKobo: { type: integer }
        revenueByDay:
          type: array
          items:
            type: object
            properties:
              date: { type: string, format: date }
              orders: { type: integer }
              revenueKobo: { type: integer }
        topVendors:
          type: array
          items:
            type: object
            properties:
              id: { type: string }
              name: { type: string }
              type: { type: string, enum: [RESTAURANT, GROCERY, RETAIL, PHARMACY] }
              rating: { type: number }
              orders: { type: integer }
              revenueKobo: { type: integer }

    VendorGraphData:
      type: object
      properties:
        granularity:
          type: string
          enum: [day, week, month]
          example: day
        points:
          type: array
          items:
            type: object
            required: [date, orders, revenueKobo]
            properties:
              date:
                type: string
                format: date
                description: "Start of the period bucket (YYYY-MM-DD). For week/month granularity this is the Monday/first-of-month in Africa/Lagos time."
                example: "2026-04-21"
              orders:
                type: integer
                example: 14
              revenueKobo:
                type: integer
                description: "Sum of subtotalKobo for PAID orders in this bucket"
                example: 3450000

    SystemGraphData:
      type: object
      properties:
        granularity:
          type: string
          enum: [day, week, month]
          example: day
        points:
          type: array
          items:
            type: object
            required: [date, orders, revenueKobo, newUsers]
            properties:
              date:
                type: string
                format: date
                description: "Start of the period bucket (YYYY-MM-DD). For week/month granularity this is the Monday/first-of-month in Africa/Lagos time."
                example: "2026-04-21"
              orders:
                type: integer
                example: 340
              revenueKobo:
                type: integer
                description: "Sum of totalKobo for PAID orders in this bucket"
                example: 87500000
              newUsers:
                type: integer
                description: "New user registrations in this bucket"
                example: 27

    # ─ Rider App ─────────────────────────────────────────────
    RiderProfile:
      type: object
      description: Full rider profile returned to the rider mobile app
      properties:
        id: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        phone: { type: string, example: "+2348012345678" }
        email: { type: string, format: email, nullable: true }
        avatarUrl: { type: string, nullable: true }
        dateOfBirth: { type: string, format: date-time, nullable: true }
        gender: { type: string, enum: [MALE, FEMALE, OTHER], nullable: true }
        streetAddress: { type: string, nullable: true }
        city: { type: string, nullable: true }
        state: { type: string, nullable: true }
        vehicleType: { type: string, enum: [BICYCLE, MOTORCYCLE, CAR, VAN], nullable: true }
        vehiclePlate: { type: string, nullable: true }
        vehicleColor: { type: string, nullable: true }
        vehicleModel: { type: string, nullable: true }
        vehicleYear: { type: integer, nullable: true }
        driverLicenseNumber: { type: string, nullable: true }
        driverLicenseExpiry: { type: string, format: date-time, nullable: true }
        vehicleInsuranceExpiry: { type: string, format: date-time, nullable: true }
        bankName: { type: string, nullable: true }
        accountNumber: { type: string, nullable: true }
        accountName: { type: string, nullable: true }
        kycStatus: { type: string, enum: [PENDING, SUBMITTED, VERIFIED, REJECTED] }
        kycNotes: { type: string, nullable: true }
        emergencyContactName: { type: string, nullable: true }
        emergencyContactPhone: { type: string, nullable: true }
        isAvailable: { type: boolean }
        isActive: { type: boolean }
        rating: { type: number }
        ratingCount: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    RiderOrder:
      type: object
      description: Order record as seen by the assigned rider
      properties:
        id: { type: string }
        trackingCode: { type: string }
        type: { type: string, enum: [FOOD, GROCERY, RETAIL, PHARMACY, PARCEL, TRUCK] }
        status:
          type: string
          enum: [PENDING, ACCEPTED, PREPARING, READY_FOR_PICKUP, PICKED_UP, IN_TRANSIT, DELIVERED, CANCELLED, FAILED]
        pickupAddress: { type: string }
        pickupLat: { type: number }
        pickupLng: { type: number }
        dropoffAddress: { type: string }
        dropoffLat: { type: number }
        dropoffLng: { type: number }
        deliveryFeeKobo: { type: integer }
        totalKobo: { type: integer }
        paymentMethod: { type: string, enum: [CARD, WALLET, CASH, WALLET_CARD] }
        recipientName: { type: string, nullable: true }
        recipientPhone: { type: string, nullable: true }
        vendor:
          type: object
          nullable: true
          properties:
            id: { type: string }
            name: { type: string }
            logoUrl: { type: string, nullable: true }
            address: { type: string }
            lat: { type: number }
            lng: { type: number }
        createdAt: { type: string, format: date-time }

    RiderOrderDetail:
      allOf:
        - $ref: "#/components/schemas/RiderOrder"
        - type: object
          properties:
            items:
              type: array
              items:
                type: object
                properties:
                  name: { type: string }
                  quantity: { type: integer }
                  unitPriceKobo: { type: integer }
                  totalKobo: { type: integer }
                  notes: { type: string, nullable: true }
            events:
              type: array
              items:
                type: object
                properties:
                  status: { type: string }
                  description: { type: string, nullable: true }
                  createdAt: { type: string, format: date-time }

    RiderEarning:
      type: object
      properties:
        id: { type: string }
        amountKobo: { type: integer }
        status: { type: string, enum: [PENDING, SETTLED] }
        settledAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        order:
          type: object
          properties:
            id: { type: string }
            trackingCode: { type: string }
            type: { type: string, enum: [FOOD, GROCERY, RETAIL, PHARMACY, PARCEL, TRUCK] }
            pickupAddress: { type: string }
            dropoffAddress: { type: string }
            createdAt: { type: string, format: date-time }

    RiderEarningsSummary:
      type: object
      properties:
        totalKobo: { type: integer, description: "Lifetime earnings in kobo" }
        todayKobo: { type: integer }
        thisWeekKobo: { type: integer }
        thisMonthKobo: { type: integer }
        pendingBalanceKobo: { type: integer, description: "Balance not yet settled/withdrawn" }
        deliveryCount: { type: integer }

    RiderWithdrawal:
      type: object
      properties:
        id: { type: string }
        amountKobo: { type: integer }
        bankName: { type: string }
        accountNumber: { type: string }
        accountName: { type: string }
        status: { type: string, enum: [PENDING, PROCESSING, COMPLETED, FAILED] }
        notes: { type: string, nullable: true }
        processedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }

    RiderNotification:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        body: { type: string }
        data: { type: object, nullable: true }
        isRead: { type: boolean }
        createdAt: { type: string, format: date-time }

    # ─ Admin Rider ────────────────────────────────────────────
    AdminRiderSummary:
      type: object
      description: Rider record as seen by system admins (list view)
      properties:
        id: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        phone: { type: string, example: "+2348012345678" }
        email: { type: string, format: email, nullable: true }
        avatarUrl: { type: string, nullable: true }
        vehicleType: { type: string, enum: [BICYCLE, MOTORCYCLE, CAR, VAN], nullable: true }
        vehiclePlate: { type: string, nullable: true }
        kycStatus: { type: string, enum: [PENDING, SUBMITTED, VERIFIED, REJECTED] }
        isAvailable: { type: boolean }
        isActive: { type: boolean }
        rating: { type: number }
        ratingCount: { type: integer }
        city: { type: string, nullable: true }
        state: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        _count:
          type: object
          properties:
            orders: { type: integer }

    AdminRiderDetail:
      type: object
      description: Full rider record returned to system admins (detail view)
      properties:
        id: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        phone: { type: string, example: "+2348012345678" }
        email: { type: string, format: email, nullable: true }
        avatarUrl: { type: string, nullable: true }
        dateOfBirth: { type: string, format: date-time, nullable: true }
        gender: { type: string, enum: [MALE, FEMALE, OTHER], nullable: true }
        streetAddress: { type: string, nullable: true }
        city: { type: string, nullable: true }
        state: { type: string, nullable: true }
        landmark: { type: string, nullable: true }
        vehicleType: { type: string, enum: [BICYCLE, MOTORCYCLE, CAR, VAN], nullable: true }
        vehiclePlate: { type: string, nullable: true }
        vehicleColor: { type: string, nullable: true }
        vehicleModel: { type: string, nullable: true }
        vehicleYear: { type: integer, nullable: true }
        driverLicenseNumber: { type: string, nullable: true }
        driverLicenseExpiry: { type: string, format: date-time, nullable: true }
        vehicleInsuranceExpiry: { type: string, format: date-time, nullable: true }
        bankName: { type: string, nullable: true }
        bankCode: { type: string, nullable: true }
        accountNumber: { type: string, nullable: true }
        accountName: { type: string, nullable: true }
        bvn: { type: string, nullable: true }
        nin: { type: string, nullable: true }
        kycStatus: { type: string, enum: [PENDING, SUBMITTED, VERIFIED, REJECTED] }
        kycNotes: { type: string, nullable: true }
        emergencyContactName: { type: string, nullable: true }
        emergencyContactPhone: { type: string, nullable: true }
        emergencyContactRelationship: { type: string, nullable: true }
        guarantors:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/RiderGuarantor"
        documents:
          $ref: "#/components/schemas/RiderDocuments"
          nullable: true
        lat: { type: number, nullable: true }
        lng: { type: number, nullable: true }
        isAvailable: { type: boolean }
        isActive: { type: boolean }
        rating: { type: number }
        ratingCount: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    RiderGuarantor:
      type: object
      required: [name, phone, address]
      properties:
        name: { type: string, example: "Chukwuemeka Obi" }
        phone: { type: string, example: "+2348012345678" }
        address: { type: string, example: "14 Admiralty Way, Lekki Phase 1, Lagos" }
        governmentIdUrl: { type: string, format: uri, description: "Cloudinary URL of guarantor's government-issued ID", nullable: true }

    RiderDocuments:
      type: object
      description: Compliance documents uploaded during KYC submission
      properties:
        governmentIdUrl: { type: string, format: uri, description: "Rider's government-issued ID (NIN, passport, or driver's licence)", nullable: true }
        vehiclePaperUrls:
          type: array
          description: "Vehicle registration / roadworthiness papers (up to 5)"
          items: { type: string, format: uri }
          nullable: true

    RiderStats:
      type: object
      properties:
        total: { type: integer }
        active: { type: integer }
        available: { type: integer }
        byKycStatus:
          type: object
          properties:
            PENDING: { type: integer }
            SUBMITTED: { type: integer }
            VERIFIED: { type: integer }
            REJECTED: { type: integer }

# ─── Paths ────────────────────────────────────────────────────
paths:

  # ══════════════════════════════════════════════════════════════
  # PUBLIC CONFIG
  # ══════════════════════════════════════════════════════════════

  /config:
    get:
      tags: [Config]
      summary: Get platform config
      description: >
        Returns public platform configuration values used by the mobile app:
        delivery fees, service charge, cost per km, Paystack public key, and coverage radius.
        No authentication required.
      responses:
        "200":
          description: Platform config
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      coverageRadiusKm: { type: number, example: 15 }
                      paystackPublicKey: { type: string, example: "pk_live_xxx" }
                      standardDeliveryFeeKobo: { type: integer, example: 75000, description: "Base delivery fee in Kobo (₦750)" }
                      serviceChargeKobo: { type: integer, example: 25000, description: "Platform service charge in Kobo (₦250)" }
                      costPerKmKobo: { type: integer, example: 10000, description: "Additional cost per km in Kobo (₦100/km)" }

  /config/vendor/{vendorId}/payment-options:
    get:
      tags: [Config]
      summary: Get vendor payment options
      description: Returns whether a vendor accepts cash on delivery. No authentication required.
      parameters:
        - name: vendorId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Vendor payment options
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  cashOnDeliveryEnabled: { type: boolean, example: false }

  # ══════════════════════════════════════════════════════════════
  # CUSTOMER API
  # ══════════════════════════════════════════════════════════════

  # ─ Auth & Onboarding ─────────────────────────────────────────
  /auth/otp/request:
    post:
      tags: [Auth]
      summary: Request OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone: { type: string, example: "+2348012345678" }
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: "OTP sent" }
                  expiresIn: { type: integer, description: "Seconds until OTP expires", example: 600 }

  /auth/otp/verify:
    post:
      tags: [Auth]
      summary: Verify OTP and issue tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, otp]
              properties:
                phone: { type: string }
                otp: { type: string, minLength: 6, maxLength: 6 }
      responses:
        "200":
          description: OTP verified — returns tokens and whether this is a new user
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  accessToken: { type: string }
                  refreshToken: { type: string }
                  isNewUser: { type: boolean }
        "400":
          description: Invalid or expired OTP
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /auth/register:
    post:
      tags: [Auth]
      summary: Complete registration (new users only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, firstName, lastName]
              properties:
                phone: { type: string }
                firstName: { type: string }
                lastName: { type: string }
                email: { type: string, format: email }
                referralCode: { type: string }
      responses:
        "201":
          description: Registration complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  accessToken: { type: string }
                  refreshToken: { type: string }
                  user: { $ref: "#/components/schemas/User" }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        "200":
          description: New token pair
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  accessToken: { type: string }
                  refreshToken: { type: string }
        "401":
          description: Invalid or expired refresh token

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout (revoke refresh token)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }

  # ─ Profile & Addresses ────────────────────────────────────────
  /me:
    get:
      tags: [Profile]
      summary: Get profile
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  id: { type: string }
                  firstName: { type: string }
                  lastName: { type: string }
                  phone: { type: string }
                  email: { type: string, format: email }
                  avatarUrl: { type: string }
                  walletBalanceKobo: { type: integer }
    patch:
      tags: [Profile]
      summary: Update profile
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName: { type: string }
                lastName: { type: string }
                email: { type: string, format: email }
                avatarUrl: { type: string }
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  user: { $ref: "#/components/schemas/User" }

  /me/avatar:
    post:
      tags: [Profile]
      summary: Upload avatar
      security: [{ BearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
      responses:
        "200":
          description: Avatar uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  avatarUrl: { type: string }

  /me/addresses:
    get:
      tags: [Profile]
      summary: List saved addresses
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Saved addresses
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  addresses:
                    type: array
                    items: { $ref: "#/components/schemas/Address" }
    post:
      tags: [Profile]
      summary: Add saved address
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label, address, lat, lng]
              properties:
                label: { type: string }
                address: { type: string }
                lat: { type: number }
                lng: { type: number }
                isDefault: { type: boolean }
      responses:
        "201":
          description: Address saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  address: { $ref: "#/components/schemas/Address" }

  /me/addresses/{id}:
    patch:
      tags: [Profile]
      summary: Update saved address
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                label: { type: string }
                address: { type: string }
                lat: { type: number }
                lng: { type: number }
                isDefault: { type: boolean }
      responses:
        "200":
          description: Address updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  address: { $ref: "#/components/schemas/Address" }
        "404":
          description: Address not found
    delete:
      tags: [Profile]
      summary: Delete saved address
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
        "404":
          description: Address not found

  # ─ Wallet ─────────────────────────────────────────────────────
  /me/wallet:
    get:
      tags: [Wallet]
      summary: Get wallet balance
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  balanceKobo: { type: integer }

  /me/wallet/transactions:
    get:
      tags: [Wallet]
      summary: Get wallet transactions
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/WalletTransaction" }
                  meta: { $ref: "#/components/schemas/Pagination" }

  /me/wallet/topup:
    post:
      tags: [Wallet]
      summary: Initialize wallet top-up via Paystack
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amountKobo]
              properties:
                amountKobo: { type: integer, minimum: 10000 }
      responses:
        "200":
          description: Paystack checkout URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  paystackAuthUrl: { type: string }
                  reference: { type: string }

  /me/wallet/topup/verify:
    post:
      tags: [Wallet]
      summary: Verify wallet top-up
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reference]
              properties:
                reference: { type: string }
      responses:
        "200":
          description: Updated balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  balanceKobo: { type: integer }
                  transaction: { $ref: "#/components/schemas/WalletTransaction" }

  # ─ Payments ───────────────────────────────────────────────────
  /payments/initialize:
    post:
      tags: [Payments]
      summary: Initialize payment for an order
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId, method]
              properties:
                orderId: { type: string }
                method:
                  type: string
                  enum: [card, wallet, cash, wallet_card]
                  description: >
                    `card` — full Paystack charge.
                    `wallet` — deduct full amount from customer wallet.
                    `cash` — mark as COD, no online payment.
                    `wallet_card` — deduct available wallet balance first, charge the remainder via Paystack.
      responses:
        "200":
          description: Payment initialized
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  method: { type: string, enum: [card, wallet, cash, wallet_card] }
                  reference: { type: string, nullable: true }
                  paid: { type: boolean, description: "true when payment is settled immediately (wallet or cash)" }
                  paystackAuthUrl: { type: string, nullable: true, description: "Paystack checkout URL. Present for card and wallet_card when card payment is needed." }
                  walletDeductedKobo: { type: integer, description: "Only for wallet_card — Kobo deducted from wallet" }
                  cardAmountKobo: { type: integer, description: "Only for wallet_card — remaining amount charged via Paystack" }
        "422":
          description: Order not found, already paid, or insufficient wallet balance
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

  /payments/verify:
