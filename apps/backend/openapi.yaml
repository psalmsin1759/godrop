  # ══════════════════════════════════════════════════════════════
  # VENDOR ONBOARDING
  # ══════════════════════════════════════════════════════════════

  /vendor:
    post:
      tags: [Vendor Onboarding]
      summary: Apply as a vendor
      description: |
        Creates a vendor and an OWNER account in one step. The vendor starts in `PENDING` status
        and must be approved by a system admin before it is visible to customers.
        A welcome email is sent to the owner's email address upon submission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type, address, lat, lng, phone, email, ownerFirstName, ownerLastName, ownerPassword]
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 100
                  example: "Mama's Kitchen"
                type:
                  type: string
                  enum: [RESTAURANT, GROCERY, RETAIL, PHARMACY]
                description:
                  type: string
                  maxLength: 500
                address:
                  type: string
                  example: "14 Admiralty Way, Lekki Phase 1, Lagos"
                lat: { type: number, example: 6.4314 }
                lng: { type: number, example: 3.4703 }
                phone:
                  type: string
                  pattern: '^\+234\d{10}$'
                  example: "+2348012345678"
                email:
                  type: string
                  format: email
                  example: "owner@mamaskitchen.ng"
                cuisines:
                  type: array
                  items: { type: string }
                  example: ["Nigerian", "Soups"]
                openingHours:
                  type: object
                  example:
                    monday: { open: "08:00", close: "22:00" }
                    friday: { open: "08:00", close: "23:00" }
                ownerFirstName: { type: string, example: "Mama" }
                ownerLastName: { type: string, example: "Ngozi" }
                ownerPassword:
                  type: string
                  minLength: 8
                  example: "SecurePass123!"
      responses:
        "201":
          description: Vendor application submitted. Welcome email sent.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  vendor: { $ref: "#/components/schemas/VendorFull" }
                  admin:
                    allOf:
                      - $ref: "#/components/schemas/VendorAdminProfile"
                      - type: object
                        description: Password excluded from response
        "409":
          description: Email already registered
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiError" }

