name: godrop_rider
description: GoDrop Rider App — delivery partner app for Nigeria.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  go_router: ^13.2.0
  google_fonts: ^6.2.1
  equatable: ^2.0.5
  cupertino_icons: ^1.0.8
  intl_phone_number_input: ^0.7.4
  geolocator: ^13.0.0
  image_picker: ^1.1.2
  google_maps_flutter: ^2.9.0
  http: ^1.2.1
  dio: ^5.4.3
  retrofit: '>=4.4.1 <4.9.0'
  flutter_secure_storage: ^9.2.2
  json_annotation: ^4.9.0
  shimmer: ^3.0.0
  web_socket_channel: ^3.0.1
  shared_preferences: ^2.3.2
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^18.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: '>=2.4.9 <2.14.0'
  retrofit_generator: '>=9.1.4 <10.0.0'
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
